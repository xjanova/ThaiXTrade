name: Server Check (Temporary)
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check server status
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 5m
          script: |
            echo "=== Docker Containers ==="
            docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Image}}"
            echo ""
            echo "=== Blockscout inspect ==="
            docker inspect blockscout-backend --format '{{.State.Status}} ExitCode={{.State.ExitCode}} Error={{.State.Error}} OOM={{.State.OOMKilled}}' 2>&1 || echo "no container"
            echo ""
            echo "=== Blockscout Backend Logs (last 50) ==="
            docker logs blockscout-backend --tail 50 2>&1 || echo "No logs"
            echo ""
            echo "=== Chain sealing? ==="
            docker logs tpix-chain-node --tail 10 2>&1 | grep -E "seal|block|IBFT|JSON" || echo "no seal info"
            echo ""
            echo "=== Chain RPC ==="
            curl -s http://127.0.0.1:8545 -X POST -H "Content-Type: application/json" -d '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' 2>/dev/null || echo "no response"
            echo ""
            echo "=== Blockscout HTTP ==="
            curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:4000 2>/dev/null || echo "000"
