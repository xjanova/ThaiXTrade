name: Server Check
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnose storage + logo
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 5m
          script: |
            cd ~/domains/tpix.online

            echo "=== Storage symlink ==="
            ls -la public_html/storage 2>/dev/null || echo "NO SYMLINK"

            echo ""
            echo "=== Storage dirs ==="
            ls -la storage/app/public/ 2>/dev/null || echo "NO storage/app/public"

            echo ""
            echo "=== Logo files ==="
            ls -la storage/app/public/logos/ 2>/dev/null || echo "NO logos dir"

            echo ""
            echo "=== site_settings logo ==="
            php artisan tinker --execute="echo App\Models\SiteSetting::where('key','logo')->first()?->value ?? 'NULL';" 2>/dev/null || echo "Cannot run tinker"

            echo ""
            echo "=== PHP writable test ==="
            php -r "echo is_writable('storage/app/public') ? 'WRITABLE' : 'NOT WRITABLE';"

            echo ""
            echo "=== Seeder test ==="
            php artisan db:seed --class=Database\\Seeders\\TpixTradingPairSeeder --force 2>&1 || echo "Seeder failed"

            echo ""
            echo "=== Trading pairs ==="
            php artisan tinker --execute="echo App\Models\TradingPair::count() . ' pairs; TPIX: ' . (App\Models\TradingPair::where('symbol','TPIX-USDT')->exists() ? 'YES' : 'NO');" 2>/dev/null || echo "Cannot check"
