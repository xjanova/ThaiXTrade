name: Server Check
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Full chain diagnostics
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 5m
          script: |
            echo "=== Containers ==="
            docker ps -a --format "table {{.Names}}\t{{.Status}}" | grep -E "tpix|blockscout|NAMES"
            echo ""
            echo "=== Frontend logs (last 20) ==="
            docker logs blockscout-frontend --tail 20 2>&1
            echo ""
            echo "=== Frontend restart count ==="
            docker inspect blockscout-frontend --format '{{.RestartCount}}' 2>/dev/null
            echo ""
            echo "=== Direct test ==="
            curl -s -o /dev/null -w "Chain: %{http_code}\n" http://127.0.0.1:8545 -X POST -H "Content-Type: application/json" -d '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' 2>/dev/null
            curl -s -o /dev/null -w "Backend: %{http_code}\n" http://127.0.0.1:4000/api/v2/stats 2>/dev/null
            curl -s -o /dev/null -w "Frontend: %{http_code}\n" http://127.0.0.1:3100/ 2>/dev/null
            curl -s -o /dev/null -w "Explorer: %{http_code}\n" https://explorer.tpix.online/ 2>/dev/null
