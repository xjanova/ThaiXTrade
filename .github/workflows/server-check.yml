name: Server Check
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Full chain diagnostics
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 5m
          script: |
            echo "=== Containers ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            echo ""
            echo "=== Chain RPC ==="
            curl -s http://127.0.0.1:8545 -X POST -H "Content-Type: application/json" -d '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}'
            echo ""
            echo "=== Blockscout Backend ==="
            curl -s http://127.0.0.1:4000/api/v2/stats 2>/dev/null | head -200
            echo ""
            echo "=== Blockscout Frontend Logs (crash reason) ==="
            docker logs blockscout-frontend --tail 20 2>&1
            echo ""
            echo "=== Explorer HTTP ==="
            curl -s -o /dev/null -w "HTTP %{http_code}" https://explorer.tpix.online/ 2>/dev/null
            echo ""
            echo "=== Explorer dir ==="
            ls -la ~/domains/explorer.tpix.online/public_html/ 2>/dev/null
