name: Server Check
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Fix translations + AI assistant
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 5m
          script: |
            cd ~/domains/tpix.online

            echo "=== Git pull latest ==="
            git pull origin main 2>&1 | tail -3

            echo ""
            echo "=== Check JSON files ==="
            ls -la resources/js/i18n/ 2>/dev/null || echo "NO i18n dir!"
            wc -l resources/js/i18n/*.json 2>/dev/null || echo "No JSON files"

            echo ""
            echo "=== Run TranslationSeeder ==="
            php artisan db:seed --class=TranslationSeeder --force 2>&1

            echo ""
            echo "=== Verify ==="
            php artisan tinker --execute="
              \$count = DB::table('translations')->count();
              echo \"Total: \$count keys\n\";
              foreach(App\Models\Language::all() as \$l) {
                \$c = DB::table('translations')->where('language_id', \$l->id)->count();
                echo \$l->code . ': ' . \$c . \" keys\n\";
              }
            " 2>/dev/null

            echo ""
            echo "=== GROQ API key check ==="
            php artisan tinker --execute="
              \$key = config('services.groq.api_key');
              echo 'Groq key: ' . (\$key ? substr(\$key, 0, 8) . '...' : 'NOT SET') . \"\n\";
            " 2>/dev/null
