name: Server Check (Temporary)
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check server status
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 5m
          script: |
            echo "=== Docker Containers ==="
            docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            echo ""
            echo "=== TPIX Chain Node Logs (last 30) ==="
            docker logs tpix-chain-node --tail 30 2>&1 || echo "No container"
            echo ""
            echo "=== Blockscout Backend Logs (last 30) ==="
            docker logs blockscout-backend --tail 30 2>&1 || echo "No container"
            echo ""
            echo "=== Blockscout DB Logs (last 10) ==="
            docker logs blockscout-db --tail 10 2>&1 || echo "No container"
            echo ""
            echo "=== Chain RPC Test ==="
            curl -s -X POST http://127.0.0.1:8545 -H "Content-Type: application/json" -d '{"jsonrpc":"2.0","method":"eth_chainId","params":[],"id":1}' 2>/dev/null || echo "No response"
            echo ""
            echo "=== Blockscout HTTP Test ==="
            curl -s -o /dev/null -w "HTTP %{http_code}" http://127.0.0.1:4000 2>/dev/null || echo "No response"
            echo ""
            echo "=== Genesis file ==="
            cat ~/tpix-infrastructure/tpix-chain/genesis.json 2>/dev/null | head -5
            echo ""
            echo "=== Disk space ==="
            df -h / | tail -1
