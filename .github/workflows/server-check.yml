name: Server Check
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Fix seed data
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 5m
          script: |
            cd ~/domains/tpix.online

            echo "=== Force delete all sale data ==="
            php artisan tinker --execute="
              DB::table('sale_transactions')->delete();
              DB::table('sale_phases')->delete();
              DB::table('token_sales')->delete();
              DB::table('carbon_retirements')->delete();
              DB::table('carbon_credits')->delete();
              DB::table('carbon_projects')->delete();
              echo \"All cleared (force)\n\";
            " 2>/dev/null

            echo "=== Re-run seeder ==="
            php artisan db:seed --class=TpixEcosystemSeeder --force 2>&1

            echo ""
            echo "=== Verify ==="
            php artisan tinker --execute="
              \$sale = App\Models\TokenSale::with('phases')->first();
              if(\$sale) {
                echo 'Sale: ' . \$sale->name . ' | phases=' . \$sale->phases->count() . \"\n\";
                foreach(\$sale->phases as \$p) echo '  ' . \$p->name . ' \$' . \$p->price_usd . ' ' . \$p->status . \"\n\";
              } else echo \"No sale\n\";
              echo 'Carbon: ' . App\Models\CarbonProject::count() . \" projects\n\";
            " 2>/dev/null
