name: Server Check
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Clean old chain data for fresh start
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 5m
          script: |
            echo "=== Cleaning old chain data for fresh genesis ==="
            CHAIN="$HOME/tpix-infrastructure/tpix-chain"

            # Stop chain
            docker compose -f "$CHAIN/docker-compose.yml" down 2>/dev/null || true
            docker compose -f "$HOME/tpix-infrastructure/blockscout/docker-compose.yml" down 2>/dev/null || true

            # Remove old data (docker creates as root)
            docker run --rm -v "$CHAIN:/chain" alpine sh -c "rm -rf /chain/data /chain/genesis.json /chain/genesis-ready" 2>/dev/null || true

            # Remove blockscout DB too
            docker volume rm blockscout_blockscout-db-data 2>/dev/null || true

            echo "✅ Old data cleaned. Run deploy-explorer workflow now."
