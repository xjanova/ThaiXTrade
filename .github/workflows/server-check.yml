name: Server Check
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Fix seed data
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 5m
          script: |
            cd ~/domains/tpix.online

            echo "=== Delete old sale (no phases) ==="
            php artisan tinker --execute="
              App\Models\SalePhase::query()->delete();
              App\Models\TokenSale::query()->delete();
              App\Models\CarbonProject::query()->delete();
              echo \"Cleared old data\n\";
            " 2>/dev/null

            echo "=== Re-run seeder ==="
            php artisan db:seed --class=TpixEcosystemSeeder --force 2>&1

            echo ""
            echo "=== Verify Token Sale ==="
            php artisan tinker --execute="
              \$sale = App\Models\TokenSale::with('phases')->first();
              if(\$sale) {
                echo 'Sale: ' . \$sale->name . ' | status=' . \$sale->status . ' | phases=' . \$sale->phases->count() . \"\n\";
                foreach(\$sale->phases as \$p) echo '  ' . \$p->name . ' | \$' . \$p->price_usd . ' | ' . \$p->status . \"\n\";
              } else echo \"No sale found\n\";
            " 2>/dev/null

            echo ""
            echo "=== Verify Carbon ==="
            php artisan tinker --execute="
              echo 'Projects: ' . App\Models\CarbonProject::count() . \"\n\";
              foreach(App\Models\CarbonProject::all() as \$p) echo \$p->name . ' | ' . \$p->status . \"\n\";
            " 2>/dev/null
