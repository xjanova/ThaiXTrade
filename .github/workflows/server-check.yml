name: Server Check
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Seed translations + check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 5m
          script: |
            cd ~/domains/tpix.online

            echo "=== Run TranslationSeeder ==="
            php artisan db:seed --class=TranslationSeeder --force 2>&1

            echo ""
            echo "=== Verify translations ==="
            php artisan tinker --execute="
              \$count = DB::table('translations')->count();
              echo \"Total translation keys: \$count\n\";
              \$groups = DB::table('translations')->select('group')->distinct()->pluck('group');
              echo 'Groups: ' . \$groups->implode(', ') . \"\n\";
              \$langs = App\Models\Language::all();
              foreach(\$langs as \$l) {
                \$c = DB::table('translations')->where('language_id', \$l->id)->count();
                echo \$l->code . ': ' . \$c . \" keys\n\";
              }
            " 2>/dev/null

            echo ""
            echo "=== Default locale ==="
            php artisan tinker --execute="
              \$def = App\Models\Language::where('is_default', true)->first();
              echo 'Default: ' . (\$def ? \$def->code . ' (' . \$def->name . ')' : 'NONE') . \"\n\";
            " 2>/dev/null
