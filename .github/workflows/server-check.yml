name: Server Check
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Full chain diagnostics
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 5m
          script: |
            echo "=== Apache modules ==="
            apache2ctl -M 2>/dev/null | grep -i proxy || httpd -M 2>/dev/null | grep -i proxy || echo "Cannot check apache modules"
            echo ""
            echo "=== Explorer error log ==="
            tail -10 ~/domains/explorer.tpix.online/logs/error.log 2>/dev/null || echo "No error log"
            echo ""
            echo "=== Explorer .htaccess ==="
            cat ~/domains/explorer.tpix.online/public_html/.htaccess 2>/dev/null
            echo ""
            echo "=== Speed test ==="
            curl -s -o /dev/null -w "Explorer HTTPS: %{time_total}s (HTTP %{http_code})\n" https://explorer.tpix.online/ 2>/dev/null
            curl -s -o /dev/null -w "Direct frontend: %{time_total}s (HTTP %{http_code})\n" http://127.0.0.1:3100/ 2>/dev/null
            curl -s -o /dev/null -w "Direct backend API: %{time_total}s (HTTP %{http_code})\n" http://127.0.0.1:4000/api/v2/stats 2>/dev/null
