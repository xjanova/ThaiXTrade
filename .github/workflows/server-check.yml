name: Server Check (Temporary)
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check server status
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 5m
          script: |
            echo "=== Docker Status ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            echo ""
            echo "=== Chain RPC ==="
            curl -s http://127.0.0.1:8545 -X POST -H "Content-Type: application/json" -d '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' 2>/dev/null || echo "no response"
            echo ""
            echo "=== Blockscout HTTP ==="
            curl -sv http://127.0.0.1:4000/ 2>&1 | head -30
            echo ""
            echo "=== Apache modules (proxy) ==="
            httpd -M 2>/dev/null | grep -i proxy || echo "httpd -M failed"
            echo ""
            echo "=== .htaccess ==="
            cat ~/domains/explorer.tpix.online/public_html/.htaccess 2>/dev/null || echo "no .htaccess"
            echo ""
            echo "=== Apache config for explorer domain ==="
            grep -r "explorer.tpix" /etc/httpd/ /usr/local/directadmin/ /etc/apache2/ 2>/dev/null | head -10 || echo "not found"
            echo ""
            echo "=== Blockscout logs (last 10) ==="
            docker logs blockscout-backend --tail 10 2>&1
