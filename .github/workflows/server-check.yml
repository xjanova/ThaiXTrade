name: Server Check
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnose DB + storage
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 5m
          script: |
            cd ~/domains/tpix.online

            echo "=== Chains in DB ==="
            php artisan tinker --execute="
              \$chains = App\Models\Chain::all();
              echo 'Total: ' . \$chains->count() . ' chains\n';
              foreach(\$chains as \$c) echo \$c->id . ' | ' . \$c->name . ' | ' . \$c->symbol . ' | ' . \$c->chain_id_hex . ' | active=' . \$c->is_active . '\n';
            " 2>/dev/null || echo "Cannot check chains"

            echo ""
            echo "=== Tokens in DB ==="
            php artisan tinker --execute="
              \$tokens = App\Models\Token::with('chain')->get();
              echo 'Total: ' . \$tokens->count() . ' tokens\n';
              foreach(\$tokens as \$t) echo \$t->id . ' | ' . \$t->symbol . ' | ' . \$t->name . ' | chain=' . (\$t->chain?->name ?? 'N/A') . ' | active=' . \$t->is_active . '\n';
            " 2>/dev/null || echo "Cannot check tokens"

            echo ""
            echo "=== Trading Pairs ==="
            php artisan tinker --execute="
              \$pairs = App\Models\TradingPair::with(['baseToken','quoteToken','chain'])->get();
              echo 'Total: ' . \$pairs->count() . ' pairs\n';
              foreach(\$pairs as \$p) echo \$p->symbol . ' | ' . (\$p->baseToken?->symbol ?? '?') . '/' . (\$p->quoteToken?->symbol ?? '?') . ' | chain=' . (\$p->chain?->name ?? '?') . '\n';
            " 2>/dev/null || echo "Cannot check"

            echo ""
            echo "=== Storage ==="
            ls -la public_html/storage 2>/dev/null | head -3
            ls storage/app/public/logos/ 2>/dev/null || echo "No logos"
