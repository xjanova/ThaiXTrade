                /* ── All Addresses Page ── */
                var accountsLoading=false;
                function formatBal(w){if(!w||w==="0")return"0";var s=w.padStart(19,"0"),wh=s.slice(0,s.length-18)||"0",fr=s.slice(s.length-18,s.length-12).replace(/0+$/,"");wh=wh.replace(/\\B(?=(\\d{3})+(?!\\d))/g,",");return fr?wh+"."+fr:wh}
