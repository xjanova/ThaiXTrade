name: Deploy TPIX Chain + Explorer
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy TPIX Chain & Blockscout
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 15m
          script: |
            echo "=== TPIX Chain + Explorer Deploy ==="

            INFRA="$HOME/tpix-infrastructure"
            CHAIN="$INFRA/tpix-chain"
            BSCOUT="$INFRA/blockscout"
            EXPLORER="$HOME/domains/explorer.tpix.online"
            RPC_DIR="$HOME/domains/rpc.tpix.online"
            IMG="0xpolygon/polygon-edge:0.9.0"

            mkdir -p "$CHAIN" "$BSCOUT"

            # === Step 1: Stop containers (keep data!) ===
            echo "[1] Stopping containers..."
            docker compose -f "$INFRA/docker-compose.yml" down 2>/dev/null || true
            docker compose -f "$CHAIN/docker-compose.yml" down 2>/dev/null || true
            docker compose -f "$BSCOUT/docker-compose.yml" down 2>/dev/null || true

            # === Step 2: Generate keys + genesis ===
            # สำคัญ: ไม่ลบ data เดิม! สร้างครั้งเดียวแล้วเก็บถาวร
            if [ ! -f "$CHAIN/data/consensus/validator.key" ]; then
              echo "[2] First time: Generating validator secrets..."
              docker run --rm -v "$CHAIN:/chain" alpine sh -c "rm -rf /chain/data /chain/genesis.json" 2>/dev/null || true
              docker run --rm -v "$CHAIN/data:/data" $IMG secrets init --data-dir /data --insecure
            else
              echo "[2] Validator keys exist, keeping..."
            fi

            # Get validator info
            SECRETS_OUT=$(docker run --rm -v "$CHAIN/data:/data" $IMG secrets output --data-dir /data 2>&1)
            echo "$SECRETS_OUT"

            # Parse Node ID
            NODE_ID=$(echo "$SECRETS_OUT" | grep "Node ID" | awk -F'= ' '{print $2}' | tr -d '[:space:]')
            # Parse Validator Address
            VALIDATOR_ADDR=$(echo "$SECRETS_OUT" | grep "Public key (address)" | awk -F'= ' '{print $2}' | tr -d '[:space:]')

            echo "Node ID: $NODE_ID"
            echo "Validator: $VALIDATOR_ADDR"

            if [ -z "$VALIDATOR_ADDR" ]; then
              echo "ERROR: Cannot get validator address!"
              exit 1
            fi

            # Generate genesis ONLY if not exists
            if [ ! -f "$CHAIN/genesis.json" ]; then
              echo "[3] Generating genesis.json..."
              BOOTNODE_FLAG=""
              if [ -n "$NODE_ID" ]; then
                BOOTNODE_FLAG="--bootnode /ip4/127.0.0.1/tcp/10001/p2p/$NODE_ID"
              fi

              # ดึง BLS public key ด้วย
              BLS_KEY=$(echo "$SECRETS_OUT" | grep "BLS Public key" | awk -F'= ' '{print $2}' | tr -d '[:space:]')
              echo "BLS Key: $BLS_KEY"

              # สร้าง validator string: address:bls_key
              if [ -n "$BLS_KEY" ]; then
                VALIDATOR_STR="${VALIDATOR_ADDR}:${BLS_KEY}"
              else
                VALIDATOR_STR="${VALIDATOR_ADDR}"
              fi

              docker run --rm -v "$CHAIN:/chain" $IMG genesis \
                --consensus ibft \
                --ibft-validator "$VALIDATOR_STR" \
                $BOOTNODE_FLAG \
                --chain-id 4289 \
                --block-gas-limit 20000000 \
                --epoch-size 100000 \
                --premine "${VALIDATOR_ADDR}:7000000000000000000000000000" \
                --dir /chain/genesis.json

              echo "Genesis created! Validator $VALIDATOR_ADDR premined with 7B TPIX"
            else
              echo "[3] Genesis exists, keeping..."
            fi

            # === Step 4: Write docker-compose files ===
            echo "[4] Writing docker-compose..."
            # ทุกอย่างรันใน network เดียวกัน เพื่อ container เข้าถึงกันได้
            cat > "$INFRA/docker-compose.yml" << 'DCALL'
            services:
              tpix-node:
                image: 0xpolygon/polygon-edge:0.9.0
                container_name: tpix-chain-node
                restart: always
                ports:
                  - "127.0.0.1:8545:8545"
                  - "127.0.0.1:10000:10000"
                  - "127.0.0.1:10001:10001"
                volumes:
                  - ./tpix-chain/data:/data
                  - ./tpix-chain/genesis.json:/genesis.json:ro
                command: server --data-dir /data --chain /genesis.json --grpc-address 0.0.0.0:10000 --libp2p 0.0.0.0:10001 --jsonrpc 0.0.0.0:8545 --seal --max-slots 4096 --block-gas-target 20000000 --price-limit 0 --log-level INFO
                healthcheck:
                  test: ["CMD-SHELL", "polygon-edge status --grpc-address 127.0.0.1:10000 > /dev/null 2>&1"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 60s
                mem_limit: 2g
                memswap_limit: 2g
                logging:
                  driver: json-file
                  options:
                    max-size: "50m"
                    max-file: "5"
                networks:
                  - tpix

              blockscout-db:
                image: postgres:16-alpine
                container_name: blockscout-db
                restart: unless-stopped
                environment:
                  POSTGRES_DB: blockscout
                  POSTGRES_USER: blockscout
                  POSTGRES_PASSWORD: tpix_explorer_db_2026
                volumes:
                  - blockscout-db-data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U blockscout"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
                networks:
                  - tpix

              blockscout-frontend:
                image: ghcr.io/blockscout/frontend:v1.38.0
                container_name: blockscout-frontend
                restart: unless-stopped
                depends_on:
                  - blockscout-backend
                environment:
                  NEXT_PUBLIC_API_HOST: explorer.tpix.online
                  NEXT_PUBLIC_API_PORT: "443"
                  NEXT_PUBLIC_API_PROTOCOL: https
                  NEXT_PUBLIC_API_WEBSOCKET_PROTOCOL: wss
                  NEXT_PUBLIC_API_BASE_PATH: /
                  NEXT_PUBLIC_NETWORK_NAME: "TPIX Chain"
                  NEXT_PUBLIC_NETWORK_SHORT_NAME: "TPIX"
                  NEXT_PUBLIC_NETWORK_ID: "4289"
                  NEXT_PUBLIC_NETWORK_CURRENCY_NAME: "TPIX"
                  NEXT_PUBLIC_NETWORK_CURRENCY_SYMBOL: "TPIX"
                  NEXT_PUBLIC_NETWORK_CURRENCY_DECIMALS: "18"
                  NEXT_PUBLIC_HOMEPAGE_CHARTS: "['daily_txs']"
                  NEXT_PUBLIC_IS_TESTNET: "false"
                  NEXT_PUBLIC_NETWORK_LOGO: "https://tpix.online/images/logotpixexplorer.webp"
                  NEXT_PUBLIC_NETWORK_LOGO_DARK: "https://tpix.online/images/logotpixexplorer.webp"
                  NEXT_PUBLIC_NETWORK_ICON: "https://tpix.online/images/logotpixexplorer.webp"
                  NEXT_PUBLIC_NETWORK_ICON_DARK: "https://tpix.online/images/logotpixexplorer.webp"
                  NEXT_PUBLIC_APP_HOST: explorer.tpix.online
                  NEXT_PUBLIC_APP_PROTOCOL: https
                  NEXT_PUBLIC_APP_PORT: "443"
                  NEXT_PUBLIC_AD_BANNER_PROVIDER: "none"
                  NEXT_PUBLIC_AD_TEXT_PROVIDER: "none"
                  NEXT_PUBLIC_PROMOTE_BLOCKSCOUT_IN_TITLE: "false"
                  NEXT_PUBLIC_HAS_BEACON_CHAIN: "false"
                  NEXT_PUBLIC_VIEWS_ADDRESS_HIDDEN_VIEWS: "[]"
                  NEXT_PUBLIC_HOMEPAGE_STATS: "['total_blocks','average_block_time','total_txs','wallet_addresses','gas_tracker']"
                  NEXT_PUBLIC_NETWORK_VERIFICATION_TYPE: "validation"
                ports:
                  - "127.0.0.1:3100:3000"
                networks:
                  - tpix

              blockscout-backend:
                image: blockscout/blockscout:6.10.1
                container_name: blockscout-backend
                restart: unless-stopped
                depends_on:
                  blockscout-db:
                    condition: service_healthy
                  tpix-node:
                    condition: service_healthy
                command: sh -c "bin/blockscout eval 'Elixir.Explorer.ReleaseTasks.create_and_migrate()' && bin/blockscout start"
                mem_limit: 2g
                memswap_limit: 2g
                logging:
                  driver: json-file
                  options:
                    max-size: "50m"
                    max-file: "3"
                environment:
                  MIX_ENV: prod
                  DATABASE_URL: postgresql://blockscout:tpix_explorer_db_2026@blockscout-db:5432/blockscout
                  ETHEREUM_JSONRPC_VARIANT: geth
                  ETHEREUM_JSONRPC_HTTP_URL: http://tpix-node:8545
                  ETHEREUM_JSONRPC_WS_URL: ws://tpix-node:8545/ws
                  ETHEREUM_JSONRPC_TRACE_URL: http://tpix-node:8545
                  ETHEREUM_JSONRPC_HTTP_TIMEOUT: "30"
                  ETHEREUM_JSONRPC_FALLBACK_HTTP_URL: http://tpix-node:8545
                  ETHEREUM_JSONRPC_FALLBACK_TRACE_URL: http://tpix-node:8545
                  CHAIN_ID: "4289"
                  NETWORK: "TPIX Chain"
                  SUBNETWORK: "Mainnet"
                  COIN: "TPIX"
                  COIN_NAME: "Thaiprompt Index"
                  BLOCK_TRANSFORMER: base
                  INDEXER_DISABLE_INTERNAL_TRANSACTIONS_FETCHER: "true"
                  INDEXER_DISABLE_PENDING_TRANSACTIONS_FETCHER: "true"
                  INDEXER_COIN_BALANCES_BATCH_SIZE: "50"
                  COIN_BALANCE_ON_DEMAND_FETCHER_ENABLED: "true"
                  TOKEN_BALANCE_ON_DEMAND_FETCHER_ENABLED: "true"
                  ECTO_USE_SSL: "false"
                  SECRET_KEY_BASE: "56OgMJny00smDFHkKNv27A7eBZmqaJPkWTp9HOYcR6M/Rij24bLey3qrB3PJFH3N"
                  API_V2_ENABLED: "true"
                  DISABLE_EXCHANGE_RATES: "true"
                  POOL_SIZE: "20"
                  POOL_SIZE_API: "5"
                  ACCOUNT_ENABLED: "false"
                  MICROSERVICE_SC_VERIFIER_ENABLED: "false"
                  MICROSERVICE_SC_VERIFIER_URL: ""
                  MICROSERVICE_VISUALIZE_SOL2UML_ENABLED: "false"
                  MICROSERVICE_SIG_PROVIDER_ENABLED: "false"
                  INDEXER_MEMORY_LIMIT: "1g"
                  FETCH_REWARDS_WAY: "manual"
                  INDEXER_CATCHUP_BLOCKS_BATCH_SIZE: "20"
                  INDEXER_CATCHUP_BLOCKS_CONCURRENCY: "2"
                  INDEXER_EMPTY_BLOCKS_SANITIZER_BATCH_SIZE: "20"
                  INDEXER_REALTIME_FETCHER_MAX_GAP: "500"
                  INDEXER_BLOCK_INTERVAL: "2"
                  PORT: "4000"
                ports:
                  - "127.0.0.1:4000:4000"
                networks:
                  - tpix

            volumes:
              blockscout-db-data:

            networks:
              tpix:
                driver: bridge
            DCALL

            # === Step 5: Start ALL services ===
            echo "[5] Starting TPIX Chain + Blockscout..."
            cd "$INFRA"
            # Start chain + db + backend without force-recreate (preserve chain state)
            docker compose up -d tpix-node blockscout-db blockscout-backend
            # Force-recreate frontend only (to pick up env var changes like logo)
            docker compose up -d --force-recreate blockscout-frontend
            echo "Waiting 20s for chain to start sealing..."
            sleep 20

            # Check if blocks are being produced
            for i in 1 2 3 4 5; do
              BLOCK=$(curl -s http://127.0.0.1:8545 -X POST -H "Content-Type: application/json" -d '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' 2>/dev/null | grep -o '"result":"[^"]*"' | cut -d'"' -f4)
              echo "Block number check $i: $BLOCK"
              if [ "$BLOCK" != "0x0" ] && [ -n "$BLOCK" ]; then
                echo "✅ Chain is producing blocks!"
                break
              fi
              sleep 5
            done

            # Check balance
            BAL=$(curl -s http://127.0.0.1:8545 -X POST -H "Content-Type: application/json" -d "{\"jsonrpc\":\"2.0\",\"method\":\"eth_getBalance\",\"params\":[\"${VALIDATOR_ADDR}\",\"latest\"],\"id\":1}" 2>/dev/null)
            echo "Validator balance: $BAL"

            echo "[7] Chain running, waiting 30s for Blockscout to start..."
            sleep 30

            # === Step 8: Setup PHP reverse proxy ===
            echo "[8] Setting up PHP reverse proxy..."
            mkdir -p "$EXPLORER/public_html"
            rm -f "$EXPLORER/public_html/index.shtml"

            cat > "$EXPLORER/public_html/.htaccess" << 'HA'
            RewriteEngine On
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^(.*)$ index.php [L,QSA]
            HA

            cat > "$EXPLORER/public_html/index.php" << 'PROXY'
            <?php
            // TPIX Explorer PHP Proxy — routes to Blockscout backend + frontend
            $path = $_SERVER['REQUEST_URI'] ?? '/';
            // Route /api-docs to frontend (not backend) so Blockscout UI renders it properly
            $isApiDocs = (strpos($path, '/api-docs') === 0);
            $isApi = (!$isApiDocs && strpos($path, '/api') === 0) || strpos($path, '/socket') === 0 || strpos($path, '/csv-export') === 0;
            $isFrontendAsset = (strpos($path, '/_next') === 0);
            $target = ($isApi) ? 'http://127.0.0.1:4000' : 'http://127.0.0.1:3100';
            if ($isFrontendAsset) $target = 'http://127.0.0.1:3100';
            $url = $target . $path;
            $ch = curl_init($url);
            $reqHeaders = ['Host: ' . ($isApi ? '127.0.0.1:4000' : '127.0.0.1:3100')];
            foreach (getallheaders() as $k => $v) {
                $l = strtolower($k);
                if ($l !== 'host' && $l !== 'connection' && $l !== 'content-length') $reqHeaders[] = "$k: $v";
            }
            curl_setopt_array($ch, [
                CURLOPT_RETURNTRANSFER => true,
                CURLOPT_HEADER => true,
                CURLOPT_HTTPHEADER => $reqHeaders,
                CURLOPT_FOLLOWLOCATION => false,
                CURLOPT_TIMEOUT => 30,
                CURLOPT_CONNECTTIMEOUT => 5,
                CURLOPT_ENCODING => '',
            ]);
            if ($_SERVER['REQUEST_METHOD'] === 'POST') {
                curl_setopt($ch, CURLOPT_POST, true);
                curl_setopt($ch, CURLOPT_POSTFIELDS, file_get_contents('php://input'));
            } elseif ($_SERVER['REQUEST_METHOD'] !== 'GET') {
                curl_setopt($ch, CURLOPT_CUSTOMREQUEST, $_SERVER['REQUEST_METHOD']);
            }
            $response = curl_exec($ch);
            if ($response === false) {
                http_response_code(502);
                echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>TPIX Explorer</title><meta http-equiv="refresh" content="5">';
                echo '<style>body{background:#0f1117;color:#e2e8f0;font-family:sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}';
                echo '.box{text-align:center;padding:40px;border:1px solid rgba(255,255,255,0.1);border-radius:16px;background:rgba(255,255,255,0.05)}';
                echo 'h1{color:#06b6d4}p{color:#94a3b8}</style></head>';
                echo '<body><div class="box"><h1>TPIX Chain Explorer</h1><p>Starting up... auto-refresh in 5s</p></div></body></html>';
                exit;
            }
            $hSize = curl_getinfo($ch, CURLINFO_HEADER_SIZE);
            $code = curl_getinfo($ch, CURLINFO_HTTP_CODE);
            $contentType = curl_getinfo($ch, CURLINFO_CONTENT_TYPE) ?? '';
            $head = substr($response, 0, $hSize);
            $body = substr($response, $hSize);
            curl_close($ch);
            http_response_code($code);
            foreach (explode("\r\n", $head) as $line) {
                $l = strtolower($line);
                if (strpos($l,'cache-control:')===0||strpos($l,'location:')===0||strpos($l,'set-cookie:')===0)
                    header($line);
            }
            // Inject TPIX branding into HTML pages
            if (strpos($contentType, 'text/html') !== false && strpos($body, '</head>') !== false) {
                $tpixBrand = '
            <link rel="icon" type="image/webp" href="https://tpix.online/images/logotpixexplorer.webp">
            <style>
            /* TPIX Explorer — Custom Branding */
            /* Replace sidebar logo — full size */
            header a[href="/"],
            nav a[href="/"] {
                display: inline-flex !important;
                align-items: center !important;
                height: auto !important;
                max-height: none !important;
                overflow: visible !important;
            }
            header a[href="/"] img,
            nav a[href="/"] img,
            [class*="NetworkLogo"] img,
            [data-testid="network-logo"] img {
                content: url(https://tpix.online/images/logotpixexplorer.webp) !important;
                height: 60px !important;
                max-height: none !important;
                width: auto !important;
                object-fit: contain !important;
            }
            /* Replace sidebar icon (mobile) */
            header a[href="/"] svg,
            nav a[href="/"] svg {
                display: none !important;
            }
            /* Expand logo parent containers */
            header a[href="/"] > div,
            nav a[href="/"] > div {
                height: auto !important;
                max-height: none !important;
                width: auto !important;
                overflow: visible !important;
            }
            /* TPIX accent color */
            :root {
                --chakra-colors-blue-500: #06b6d4 !important;
                --chakra-colors-blue-600: #0891b2 !important;
            }
            </style>
            <script>
            // Replace logo images after hydration
            (function(){
                var logo = "https://tpix.online/images/logotpixexplorer.webp";
                function replaceLogo(){
                    // Find all logo images in header/nav links to "/"
                    document.querySelectorAll("header a[href=\'/\'] img, nav a[href=\'/\'] img").forEach(function(img){
                        if(img.src !== logo){ img.src = logo; img.style.height="60px"; img.style.maxHeight="none"; img.style.width="auto"; }
                    });
                    // Find Blockscout SVG logos and replace with img
                    document.querySelectorAll("header a[href=\'/\'] svg, nav a[href=\'/\'] svg").forEach(function(svg){
                        var img = document.createElement("img");
                        img.src = logo; img.alt = "TPIX Explorer";
                        img.style.cssText = "height:60px;width:auto";
                        svg.parentNode.replaceChild(img, svg);
                    });
                    // Replace footer copyright
                    document.querySelectorAll("footer, [class*=footer], [class*=Footer]").forEach(function(el){
                        var walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
                        while(walker.nextNode()){
                            var node = walker.currentNode;
                            if(node.textContent.indexOf("Blockscout")!==-1 && node.textContent.indexOf("Limited")!==-1){
                                node.textContent = node.textContent.replace(/Copyright\s*©?\s*Blockscout\s+Limited\s+\d{4}[-–]\d{4}/gi, "© Xman Studio 2024-2026");
                                node.textContent = node.textContent.replace(/Blockscout\s+Limited/gi, "Xman Studio");
                            }
                        }
                        // Replace Blockscout link with Xman Studio
                        el.querySelectorAll("a[href*=\'blockscout.com\']").forEach(function(a){
                            a.href = "https://xman4289.com";
                            a.textContent = "Xman Studio";
                        });
                    });
                }
                // Run on load + observe for SPA navigation
                if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",replaceLogo)}else{replaceLogo()}
                var obs = new MutationObserver(function(){ replaceLogo() });
                obs.observe(document.body||document.documentElement, {childList:true, subtree:true});
                // Stop observing after 30s to save resources
                setTimeout(function(){ obs.disconnect() }, 30000);
            })();
            </script>';
                $body = str_replace('</head>', $tpixBrand . '</head>', $body);
                header('Content-Type: text/html; charset=utf-8');
            } else {
                header('Content-Type: ' . $contentType);
            }
            echo $body;
            PROXY

            # RPC proxy
            if [ -d "$RPC_DIR" ]; then
              mkdir -p "$RPC_DIR/public_html"
              cat > "$RPC_DIR/public_html/.htaccess" << 'HA2'
            RewriteEngine On
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteRule ^(.*)$ index.php [L,QSA]
            HA2
              cat > "$RPC_DIR/public_html/index.php" << 'RPC'
            <?php
            header('Access-Control-Allow-Origin: *');
            header('Access-Control-Allow-Methods: POST, GET, OPTIONS');
            header('Access-Control-Allow-Headers: Content-Type');
            if ($_SERVER['REQUEST_METHOD']==='OPTIONS'){http_response_code(204);exit;}
            $ch = curl_init('http://127.0.0.1:8545');
            curl_setopt_array($ch,[CURLOPT_RETURNTRANSFER=>true,CURLOPT_TIMEOUT=>30,CURLOPT_HTTPHEADER=>['Content-Type: application/json']]);
            if ($_SERVER['REQUEST_METHOD']==='POST'){curl_setopt($ch,CURLOPT_POST,true);curl_setopt($ch,CURLOPT_POSTFIELDS,file_get_contents('php://input'));}
            $r=curl_exec($ch);$code=curl_getinfo($ch,CURLINFO_HTTP_CODE);curl_close($ch);
            if($r===false){http_response_code(502);header('Content-Type: application/json');echo '{"jsonrpc":"2.0","error":{"code":-32000,"message":"RPC unavailable"},"id":null}';exit;}
            http_response_code($code);header('Content-Type: application/json');echo $r;
            RPC
            fi

            # === Final status ===
            echo ""
            echo "=== STATUS ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            echo ""
            FINAL_BLOCK=$(curl -s http://127.0.0.1:8545 -X POST -H "Content-Type: application/json" -d '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' 2>/dev/null)
            echo "Block: $FINAL_BLOCK"
            FINAL_BAL=$(curl -s http://127.0.0.1:8545 -X POST -H "Content-Type: application/json" -d "{\"jsonrpc\":\"2.0\",\"method\":\"eth_getBalance\",\"params\":[\"${VALIDATOR_ADDR}\",\"latest\"],\"id\":1}" 2>/dev/null)
            echo "Balance: $FINAL_BAL"
            # Wait more for Blockscout to fully start
            echo "Waiting 60s for Blockscout indexing..."
            sleep 60
            BS_BACK=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:4000/api/v2/stats 2>/dev/null)
            echo "Blockscout backend API: HTTP $BS_BACK"
            BS_FRONT=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3100 2>/dev/null)
            echo "Blockscout frontend: HTTP $BS_FRONT"
            EXPLORER_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://explorer.tpix.online/ 2>/dev/null)
            echo "Explorer proxy: HTTP $EXPLORER_STATUS"
            BS_API=$(curl -s "http://127.0.0.1:4000/api?module=block&action=eth_block_number" 2>/dev/null | head -200)
            echo "Blockscout API: $BS_API"
            echo ""
            echo "=== Blockscout logs (last 10) ==="
            docker logs blockscout-backend --tail 10 2>&1
            # === Setup chain watchdog cron (ทุก 5 นาที) ===
            echo ""
            echo "=== Setting up chain watchdog cron ==="
            WATCHDOG_SCRIPT="$HOME/chain-watchdog.sh"
            WATCHDOG_LOG="$HOME/tpix-watchdog.log"

            cat > "$WATCHDOG_SCRIPT" << WATCHDOG_EOF
#!/bin/bash
# TPIX Chain Watchdog — auto-restart if chain stops producing blocks
# Installed by deploy-explorer workflow
RPC="http://127.0.0.1:8545"
INFRA="$HOME/tpix-infrastructure"
LOG="$HOME/tpix-watchdog.log"
RESTART_FILE="/tmp/tpix-restart-count"

log() { echo "[\$(date '+%Y-%m-%d %H:%M:%S')] \$1" >> "\$LOG"; }

get_block() {
    curl -s --max-time 10 "\$RPC" -X POST \\
        -H "Content-Type: application/json" \\
        -d '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' 2>/dev/null \\
        | grep -o '"result":"[^"]*"' | cut -d'"' -f4
}

# Check container running
STATUS=\$(docker inspect -f '{{.State.Status}}' tpix-chain-node 2>/dev/null || echo "dead")
if [ "\$STATUS" != "running" ]; then
    log "ERROR: Container not running (\$STATUS) — starting..."
    cd "\$INFRA" && docker compose up -d tpix-node
    sleep 15
    log "Container restarted"
    exit 0
fi

# Check RPC responding
B1=\$(get_block)
if [ -z "\$B1" ]; then
    log "ERROR: RPC not responding — restarting..."
    cd "\$INFRA" && docker compose restart tpix-node
    sleep 15
    docker compose restart blockscout-backend 2>/dev/null || true
    log "Restarted (RPC dead)"
    exit 0
fi

# Check blocks progressing
sleep 6
B2=\$(get_block)

if [ "\$B1" = "\$B2" ]; then
    COUNT=0
    if [ -f "\$RESTART_FILE" ]; then
        AGE=\$(( \$(date +%s) - \$(stat -c %Y "\$RESTART_FILE" 2>/dev/null || echo 0) ))
        [ \$AGE -gt 3600 ] && echo "0" > "\$RESTART_FILE"
        COUNT=\$(cat "\$RESTART_FILE" 2>/dev/null || echo 0)
    fi
    if [ "\$COUNT" -ge 3 ]; then
        log "CRITICAL: 3+ restarts in 1h — manual fix needed!"
        exit 1
    fi
    echo "\$((COUNT + 1))" > "\$RESTART_FILE"

    log "ERROR: Chain stuck at \$B1 — restarting (attempt \$((COUNT+1))/3)..."
    cd "\$INFRA" && docker compose restart tpix-node
    sleep 15
    docker compose restart blockscout-backend 2>/dev/null || true
    B3=\$(get_block)
    log "After restart: block \$B3"
else
    BDEC=\$(printf "%d" "\$B2" 2>/dev/null || echo "?")
    log "OK: block \$B2 (\$BDEC)"
fi
WATCHDOG_EOF

            chmod +x "$WATCHDOG_SCRIPT"

            # ติดตั้ง cron ทุก 5 นาที
            CRON_LINE="*/5 * * * * $WATCHDOG_SCRIPT >> $WATCHDOG_LOG 2>&1"
            # ลบ cron เก่า แล้วเพิ่มใหม่
            (crontab -l 2>/dev/null | grep -v "$WATCHDOG_SCRIPT" || true; echo "$CRON_LINE") | crontab -
            echo "Cron installed: $CRON_LINE"
            crontab -l | grep "chain-watchdog" || echo "Warning: cron not set"
            touch "$WATCHDOG_LOG" 2>/dev/null || true

            echo ""
            echo "Validator: $VALIDATOR_ADDR"
            echo "Explorer: https://explorer.tpix.online"
            echo "RPC: https://rpc.tpix.online"
            echo "Watchdog: cron every 5 min"
            echo "=== DONE ==="
