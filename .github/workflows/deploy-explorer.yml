                    var newMain=document.createElement("main");newMain.innerHTML=\'<div class="tpix-accounts-wrapper" id="tpix-accounts"><div class="tpix-loading"><div class="spinner"></div>Loading all addresses...</div></div>\';main.replaceWith(newMain);
