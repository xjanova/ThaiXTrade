name: Deploy TPIX Chain + Explorer
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy TPIX Chain & Blockscout
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 15m
          script: |
            echo "=== TPIX Chain + Blockscout Deploy ==="

            INFRA="$HOME/tpix-infrastructure"
            CHAIN="$INFRA/tpix-chain"
            BSCOUT="$INFRA/blockscout"
            EXPLORER="$HOME/domains/explorer.tpix.online"
            IMG="0xpolygon/polygon-edge:0.9.0"

            mkdir -p "$CHAIN" "$BSCOUT"

            # --- Stop old containers ---
            echo "[1] Stopping old containers..."
            docker compose -f "$CHAIN/docker-compose.yml" down 2>/dev/null || true
            docker compose -f "$BSCOUT/docker-compose.yml" down 2>/dev/null || true

            # --- Clean broken genesis (was directory not file) ---
            if [ -d "$CHAIN/genesis.json" ]; then
              echo "Removing broken genesis.json directory..."
              rm -rf "$CHAIN/genesis.json"
            fi

            # --- Force clean regeneration (docker files owned by root) ---
            echo "Force regenerating genesis..."
            docker run --rm -v "$CHAIN:/chain" alpine sh -c "rm -rf /chain/data /chain/genesis.json" 2>/dev/null || true

            if true; then
              echo "[2] Generating validator secrets..."
              docker run --rm -v "$CHAIN/data:/data" $IMG secrets init --data-dir /data --insecure

              # ดึง Node ID สำหรับ bootnode (parse จาก libp2p key)
              SECRETS_OUT=$(docker run --rm -v "$CHAIN/data:/data" $IMG secrets output --data-dir /data 2>&1)
              echo "Secrets output:"
              echo "$SECRETS_OUT"
              NODE_ID=$(echo "$SECRETS_OUT" | grep -oP 'Node ID\s*=\s*\K\S+' || echo "")
              if [ -z "$NODE_ID" ]; then
                # ลอง format อื่น
                NODE_ID=$(echo "$SECRETS_OUT" | grep "Node ID" | sed 's/.*= *//' | tr -d '[:space:]')
              fi
              echo "Parsed Node ID: [$NODE_ID]"

              # ดึง Validator Address สำหรับ premine
              VALIDATOR_ADDR=$(echo "$SECRETS_OUT" | grep -oP 'Public key \(address\)\s*=\s*\K\S+' || echo "")
              if [ -z "$VALIDATOR_ADDR" ]; then
                VALIDATOR_ADDR=$(echo "$SECRETS_OUT" | grep "Public key" | grep "address" | sed 's/.*= *//' | tr -d '[:space:]')
              fi
              echo "Validator Address: [$VALIDATOR_ADDR]"
              if [ -z "$VALIDATOR_ADDR" ]; then
                VALIDATOR_ADDR="0xf9fF7E78D032377F395E0fa5007E701f13D05e9e"
                echo "Using fallback validator address"
              fi
              if [ -z "$NODE_ID" ]; then
                echo "ERROR: Could not parse Node ID from secrets output!"
                echo "Trying without bootnode..."
                BOOTNODE_FLAG=""
              else
                BOOTNODE_FLAG="--bootnode /ip4/127.0.0.1/tcp/10001/p2p/$NODE_ID"
              fi

              echo "[3] Generating genesis.json..."
              docker run --rm -v "$CHAIN:/chain" $IMG genesis \
                --consensus ibft \
                --ibft-validators-prefix-path /chain \
                $BOOTNODE_FLAG \
                --chain-id 7000 \
                --block-gas-limit 20000000 \
                --epoch-size 100000 \
                --premine "${VALIDATOR_ADDR}:7000000000000000000000000000" \
                --dir /chain/genesis.json

              echo "Genesis created:"
              cat "$CHAIN/genesis.json" | head -20
            else
              echo "[2-3] Genesis exists, skipping..."
            fi

            # --- Verify genesis is a file ---
            if [ ! -f "$CHAIN/genesis.json" ]; then
              echo "ERROR: genesis.json not created!"
              exit 1
            fi

            # --- Chain docker-compose ---
            echo "[4] Writing docker-compose files..."
            cat > "$CHAIN/docker-compose.yml" << 'DC1'
            services:
              tpix-node:
                image: 0xpolygon/polygon-edge:0.9.0
                container_name: tpix-chain-node
                restart: unless-stopped
                ports:
                  - "127.0.0.1:8545:8545"
                  - "127.0.0.1:10000:10000"
                  - "127.0.0.1:10001:10001"
                volumes:
                  - ./data:/data
                  - ./genesis.json:/genesis.json:ro
                command: server --data-dir /data --chain /genesis.json --grpc-address 0.0.0.0:10000 --libp2p 0.0.0.0:10001 --jsonrpc 0.0.0.0:8545 --seal --max-slots 4096 --block-gas-target 20000000 --price-limit 0
            DC1

            cat > "$BSCOUT/docker-compose.yml" << 'DC2'
            services:
              db:
                image: postgres:16-alpine
                container_name: blockscout-db
                restart: unless-stopped
                environment:
                  POSTGRES_DB: blockscout
                  POSTGRES_USER: blockscout
                  POSTGRES_PASSWORD: tpix_explorer_db_2026
                volumes:
                  - blockscout-db-data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U blockscout"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
              backend:
                image: blockscout/blockscout:5.4.0
                container_name: blockscout-backend
                restart: unless-stopped
                depends_on:
                  db:
                    condition: service_healthy
                extra_hosts:
                  - "host.docker.internal:host-gateway"
                command: sh -c "bin/blockscout eval 'Elixir.Explorer.ReleaseTasks.create_and_migrate()' && bin/blockscout start"
                environment:
                  MIX_ENV: prod
                  DATABASE_URL: postgresql://blockscout:tpix_explorer_db_2026@db:5432/blockscout
                  ETHEREUM_JSONRPC_VARIANT: geth
                  ETHEREUM_JSONRPC_HTTP_URL: http://host.docker.internal:8545
                  ETHEREUM_JSONRPC_WS_URL: ws://host.docker.internal:8545
                  ETHEREUM_JSONRPC_TRACE_URL: http://host.docker.internal:8545
                  CHAIN_ID: "7000"
                  NETWORK: "TPIX Chain"
                  SUBNETWORK: "Mainnet"
                  COIN: "TPIX"
                  COIN_NAME: "Thaiprompt Index"
                  BLOCK_TRANSFORMER: base
                  INDEXER_DISABLE_INTERNAL_TRANSACTIONS_FETCHER: "true"
                  INDEXER_DISABLE_PENDING_TRANSACTIONS_FETCHER: "true"
                  ECTO_USE_SSL: "false"
                  SECRET_KEY_BASE: "56OgMJny00smDFHkKNv27A7eBZmqaJPkWTp9HOYcR6M/Rij24bLey3qrB3PJFH3N"
                  API_V2_ENABLED: "true"
                  DISABLE_EXCHANGE_RATES: "true"
                  SHOW_TXS_CHART: "true"
                  POOL_SIZE: "30"
                  POOL_SIZE_API: "10"
                  ACCOUNT_ENABLED: "false"
                  MICROSERVICE_SC_VERIFIER_ENABLED: "false"
                  MICROSERVICE_SC_VERIFIER_URL: ""
                  INDEXER_MEMORY_LIMIT: "1g"
                  FETCH_REWARDS_WAY: "manual"
                  PORT: "4000"
                ports:
                  - "4000:4000"
            volumes:
              blockscout-db-data:
            DC2

            # --- Clean blockscout DB (may have wrong schema from latest) ---
            echo "[4b] Cleaning old blockscout data..."
            docker volume rm blockscout_blockscout-db-data 2>/dev/null || true

            # --- Start chain ---
            echo "[5] Starting TPIX Chain..."
            cd "$CHAIN"
            docker compose up -d
            echo "Waiting 20s..."
            sleep 20

            RPC=$(curl -s -X POST http://127.0.0.1:8545 -H "Content-Type: application/json" -d '{"jsonrpc":"2.0","method":"eth_chainId","params":[],"id":1}' 2>/dev/null || echo "no response")
            echo "Chain RPC: $RPC"

            # --- Start blockscout ---
            echo "[6] Starting Blockscout..."
            cd "$BSCOUT"
            docker compose up -d
            echo "Waiting 30s..."
            sleep 30

            # --- Proxy setup ---
            echo "[7] Setting up proxy..."
            mkdir -p "$EXPLORER/public_html"
            # === Explorer: PHP reverse proxy (Apache ไม่มี mod_proxy) ===
            cat > "$EXPLORER/public_html/.htaccess" << 'HA'
            RewriteEngine On
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^(.*)$ index.php [L,QSA]
            HA

            cat > "$EXPLORER/public_html/index.php" << 'PROXY'
            <?php
            // TPIX Chain Explorer — PHP Reverse Proxy to Blockscout
            // เนื่องจาก Apache ไม่มี mod_proxy จึงใช้ PHP proxy แทน
            $target = 'http://127.0.0.1:4000';
            $path = $_SERVER['REQUEST_URI'] ?? '/';

            // Root path → redirect ไปที่ /blocks (Blockscout v5 ไม่มี homepage)
            if ($path === '/' || $path === '' || $path === '/index.php') {
                header('Location: /blocks');
                exit;
            }

            $url = $target . $path;

            $ch = curl_init($url);
            $reqHeaders = [];
            foreach (getallheaders() as $k => $v) {
                $lower = strtolower($k);
                if ($lower !== 'host' && $lower !== 'connection') {
                    $reqHeaders[] = "$k: $v";
                }
            }
            $reqHeaders[] = 'Host: 127.0.0.1:4000';

            curl_setopt_array($ch, [
                CURLOPT_RETURNTRANSFER => true,
                CURLOPT_HEADER         => true,
                CURLOPT_HTTPHEADER     => $reqHeaders,
                CURLOPT_FOLLOWLOCATION => false,
                CURLOPT_TIMEOUT        => 30,
                CURLOPT_ENCODING       => '',
            ]);

            $method = $_SERVER['REQUEST_METHOD'];
            if ($method === 'POST') {
                curl_setopt($ch, CURLOPT_POST, true);
                curl_setopt($ch, CURLOPT_POSTFIELDS, file_get_contents('php://input'));
            } elseif ($method !== 'GET') {
                curl_setopt($ch, CURLOPT_CUSTOMREQUEST, $method);
                if (in_array($method, ['PUT', 'PATCH'])) {
                    curl_setopt($ch, CURLOPT_POSTFIELDS, file_get_contents('php://input'));
                }
            }

            $response = curl_exec($ch);
            if ($response === false) {
                http_response_code(502);
                echo '<h1>TPIX Explorer - Service Starting</h1><p>Blockscout is initializing... Please refresh in a moment.</p>';
                exit;
            }

            $headerSize = curl_getinfo($ch, CURLINFO_HEADER_SIZE);
            $httpCode   = curl_getinfo($ch, CURLINFO_HTTP_CODE);
            $headers    = substr($response, 0, $headerSize);
            $body       = substr($response, $headerSize);
            curl_close($ch);

            http_response_code($httpCode);
            foreach (explode("\r\n", $headers) as $line) {
                $lower = strtolower($line);
                if (strpos($lower, 'content-type:') === 0 ||
                    strpos($lower, 'cache-control:') === 0 ||
                    strpos($lower, 'etag:') === 0 ||
                    strpos($lower, 'location:') === 0 ||
                    strpos($lower, 'set-cookie:') === 0 ||
                    strpos($lower, 'x-request-id:') === 0) {
                    header($line);
                }
            }
            echo $body;
            PROXY

            # === RPC Proxy: สร้างที่ rpc.tpix.online ===
            RPC_DIR="$HOME/domains/rpc.tpix.online"
            if [ -d "$RPC_DIR" ]; then
              echo "[7b] Setting up RPC proxy at rpc.tpix.online..."
              mkdir -p "$RPC_DIR/public_html"

              cat > "$RPC_DIR/public_html/.htaccess" << 'HA2'
            RewriteEngine On
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteRule ^(.*)$ index.php [L,QSA]
            HA2

              cat > "$RPC_DIR/public_html/index.php" << 'RPCPROXY'
            <?php
            // TPIX Chain RPC — PHP Reverse Proxy to Polygon Edge JSON-RPC
            header('Access-Control-Allow-Origin: *');
            header('Access-Control-Allow-Methods: POST, GET, OPTIONS');
            header('Access-Control-Allow-Headers: Content-Type');

            if ($_SERVER['REQUEST_METHOD'] === 'OPTIONS') {
                http_response_code(204);
                exit;
            }

            $target = 'http://127.0.0.1:8545';
            $ch = curl_init($target);
            curl_setopt_array($ch, [
                CURLOPT_RETURNTRANSFER => true,
                CURLOPT_TIMEOUT        => 30,
                CURLOPT_HTTPHEADER     => ['Content-Type: application/json'],
            ]);

            if ($_SERVER['REQUEST_METHOD'] === 'POST') {
                $input = file_get_contents('php://input');
                curl_setopt($ch, CURLOPT_POST, true);
                curl_setopt($ch, CURLOPT_POSTFIELDS, $input);
            }

            $response = curl_exec($ch);
            $httpCode = curl_getinfo($ch, CURLINFO_HTTP_CODE);
            curl_close($ch);

            if ($response === false) {
                http_response_code(502);
                header('Content-Type: application/json');
                echo json_encode(['jsonrpc' => '2.0', 'error' => ['code' => -32000, 'message' => 'RPC node unavailable'], 'id' => null]);
                exit;
            }

            http_response_code($httpCode);
            header('Content-Type: application/json');
            echo $response;
            RPCPROXY

              echo "✅ RPC proxy ready at rpc.tpix.online"
            else
              echo "⚠️ rpc.tpix.online domain dir not found — skip RPC proxy setup"
            fi

            # --- Status ---
            echo ""
            echo "=== Status ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            echo ""
            echo "Chain node logs (last 5):"
            docker logs tpix-chain-node --tail 5 2>&1
            echo ""
            BS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:4000 2>/dev/null || echo "000")
            echo "Blockscout HTTP: $BS"
            echo ""
            echo "=== DONE: https://explorer.tpix.online ==="
