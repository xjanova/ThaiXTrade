name: Deploy TPIX Chain + Explorer
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy TPIX Chain & Blockscout
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 15m
          script: |
            echo "=== TPIX Chain + Explorer Deploy ==="

            INFRA="$HOME/tpix-infrastructure"
            CHAIN="$INFRA/tpix-chain"
            BSCOUT="$INFRA/blockscout"
            EXPLORER="$HOME/domains/explorer.tpix.online"
            RPC_DIR="$HOME/domains/rpc.tpix.online"
            IMG="0xpolygon/polygon-edge:0.9.0"

            mkdir -p "$CHAIN" "$BSCOUT"

            # === Step 1: Stop running containers ===
            echo "[1] Stopping containers..."
            docker compose -f "$INFRA/docker-compose.yml" down 2>/dev/null || true
            # Legacy cleanup
            docker compose -f "$CHAIN/docker-compose.yml" down 2>/dev/null || true
            docker compose -f "$BSCOUT/docker-compose.yml" down 2>/dev/null || true

            # === Step 2: Generate keys + genesis ONLY if not exists ===
            # สำคัญ: ไม่ลบ data เดิม! สร้างครั้งเดียวแล้วเก็บถาวร
            if [ ! -f "$CHAIN/data/consensus/validator.key" ]; then
              echo "[2] First time: Generating validator secrets..."
              docker run --rm -v "$CHAIN:/chain" alpine sh -c "rm -rf /chain/data /chain/genesis.json" 2>/dev/null || true
              docker run --rm -v "$CHAIN/data:/data" $IMG secrets init --data-dir /data --insecure
            else
              echo "[2] Validator keys exist, keeping..."
            fi

            # Get validator info
            SECRETS_OUT=$(docker run --rm -v "$CHAIN/data:/data" $IMG secrets output --data-dir /data 2>&1)
            echo "$SECRETS_OUT"

            # Parse Node ID
            NODE_ID=$(echo "$SECRETS_OUT" | grep "Node ID" | awk -F'= ' '{print $2}' | tr -d '[:space:]')
            # Parse Validator Address
            VALIDATOR_ADDR=$(echo "$SECRETS_OUT" | grep "Public key (address)" | awk -F'= ' '{print $2}' | tr -d '[:space:]')

            echo "Node ID: $NODE_ID"
            echo "Validator: $VALIDATOR_ADDR"

            if [ -z "$VALIDATOR_ADDR" ]; then
              echo "ERROR: Cannot get validator address!"
              exit 1
            fi

            # Generate genesis ONLY if not exists
            if [ ! -f "$CHAIN/genesis.json" ]; then
              echo "[3] Generating genesis.json..."
              BOOTNODE_FLAG=""
              if [ -n "$NODE_ID" ]; then
                BOOTNODE_FLAG="--bootnode /ip4/127.0.0.1/tcp/10001/p2p/$NODE_ID"
              fi

              # ดึง BLS public key ด้วย
              BLS_KEY=$(echo "$SECRETS_OUT" | grep "BLS Public key" | awk -F'= ' '{print $2}' | tr -d '[:space:]')
              echo "BLS Key: $BLS_KEY"

              # สร้าง validator string: address:bls_key
              if [ -n "$BLS_KEY" ]; then
                VALIDATOR_STR="${VALIDATOR_ADDR}:${BLS_KEY}"
              else
                VALIDATOR_STR="${VALIDATOR_ADDR}"
              fi

              docker run --rm -v "$CHAIN:/chain" $IMG genesis \
                --consensus ibft \
                --ibft-validator "$VALIDATOR_STR" \
                $BOOTNODE_FLAG \
                --chain-id 7000 \
                --block-gas-limit 20000000 \
                --epoch-size 100000 \
                --premine "${VALIDATOR_ADDR}:7000000000000000000000000000" \
                --dir /chain/genesis.json

              echo "Genesis created! Validator $VALIDATOR_ADDR premined with 7B TPIX"
            else
              echo "[3] Genesis exists, keeping..."
            fi

            # === Step 4: Write docker-compose files ===
            echo "[4] Writing docker-compose..."
            # ทุกอย่างรันใน network เดียวกัน เพื่อ container เข้าถึงกันได้
            cat > "$INFRA/docker-compose.yml" << 'DCALL'
            services:
              tpix-node:
                image: 0xpolygon/polygon-edge:0.9.0
                container_name: tpix-chain-node
                restart: unless-stopped
                ports:
                  - "127.0.0.1:8545:8545"
                  - "127.0.0.1:10000:10000"
                  - "127.0.0.1:10001:10001"
                volumes:
                  - ./tpix-chain/data:/data
                  - ./tpix-chain/genesis.json:/genesis.json:ro
                command: server --data-dir /data --chain /genesis.json --grpc-address 0.0.0.0:10000 --libp2p 0.0.0.0:10001 --jsonrpc 0.0.0.0:8545 --seal --max-slots 4096 --block-gas-target 20000000 --price-limit 0
                networks:
                  - tpix


            networks:
              tpix:
                driver: bridge
            DCALL

            # === Step 5: Cleanup old blockscout ===
            echo "[5] Cleanup old blockscout..."
            docker rm -f blockscout-backend blockscout-db 2>/dev/null || true
            docker volume rm tpix-infrastructure_blockscout-db-data blockscout_blockscout-db-data 2>/dev/null || true

            # === Step 6: Start TPIX Chain ===
            echo "[6] Starting TPIX Chain..."
            cd "$INFRA"
            docker compose up -d
            echo "Waiting 20s for chain to start sealing..."
            sleep 20

            # Check if blocks are being produced
            for i in 1 2 3 4 5; do
              BLOCK=$(curl -s http://127.0.0.1:8545 -X POST -H "Content-Type: application/json" -d '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' 2>/dev/null | grep -o '"result":"[^"]*"' | cut -d'"' -f4)
              echo "Block number check $i: $BLOCK"
              if [ "$BLOCK" != "0x0" ] && [ -n "$BLOCK" ]; then
                echo "✅ Chain is producing blocks!"
                break
              fi
              sleep 5
            done

            # Check balance
            BAL=$(curl -s http://127.0.0.1:8545 -X POST -H "Content-Type: application/json" -d "{\"jsonrpc\":\"2.0\",\"method\":\"eth_getBalance\",\"params\":[\"${VALIDATOR_ADDR}\",\"latest\"],\"id\":1}" 2>/dev/null)
            echo "Validator balance: $BAL"

            echo "[7] Chain running, setting up explorer..."

            # === Step 8: Setup proxies ===
            echo "[8] Setting up proxies..."
            mkdir -p "$EXPLORER/public_html"
            rm -f "$EXPLORER/public_html/proxy.php" "$EXPLORER/public_html/index.html"

            # Explorer: RPC-based API endpoint (สำหรับ frontend ดึงข้อมูล)
            cat > "$EXPLORER/public_html/.htaccess" << 'HA'
            RewriteEngine On
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteRule ^api/(.*)$ api.php [L,QSA]
            HA

            # API endpoint สำหรับ explorer frontend
            cat > "$EXPLORER/public_html/api.php" << 'API'
            <?php
            header('Access-Control-Allow-Origin: *');
            header('Access-Control-Allow-Headers: Content-Type');
            header('Content-Type: application/json');
            if($_SERVER['REQUEST_METHOD']==='OPTIONS'){http_response_code(204);exit;}
            $rpc='http://127.0.0.1:8545';
            function rpc($method,$params=[]){
              global $rpc;
              $ch=curl_init($rpc);
              curl_setopt_array($ch,[CURLOPT_RETURNTRANSFER=>true,CURLOPT_POST=>true,CURLOPT_TIMEOUT=>10,
                CURLOPT_HTTPHEADER=>['Content-Type: application/json'],
                CURLOPT_POSTFIELDS=>json_encode(['jsonrpc'=>'2.0','method'=>$method,'params'=>$params,'id'=>1])]);
              $r=curl_exec($ch);curl_close($ch);
              return $r?json_decode($r,true):null;
            }
            $action=$_GET['action']??'status';
            switch($action){
              case 'status':
                $bn=rpc('eth_blockNumber');
                $cid=rpc('eth_chainId');
                echo json_encode(['block_number'=>hexdec($bn['result']??'0x0'),'chain_id'=>hexdec($cid['result']??'0x0'),'name'=>'TPIX Chain','coin'=>'TPIX','version'=>'v0.9.0']);
                break;
              case 'block':
                $num=$_GET['number']??'latest';
                $hex=is_numeric($num)?'0x'.dechex((int)$num):$num;
                $b=rpc('eth_getBlockByNumber',[$hex,true]);
                echo json_encode($b['result']??null);
                break;
              case 'blocks':
                $bn=rpc('eth_blockNumber');
                $latest=hexdec($bn['result']??'0x0');
                $count=min((int)($_GET['count']??10),50);
                $blocks=[];
                for($i=$latest;$i>max(0,$latest-$count);$i--){
                  $b=rpc('eth_getBlockByNumber',['0x'.dechex($i),false]);
                  if($b&&isset($b['result']))$blocks[]=$b['result'];
                }
                echo json_encode($blocks);
                break;
              case 'balance':
                $addr=$_GET['address']??'';
                if(!preg_match('/^0x[a-fA-F0-9]{40}$/',$addr)){echo '{"error":"invalid address"}';break;}
                $b=rpc('eth_getBalance',[$addr,'latest']);
                $wei=$b['result']??'0x0';
                echo json_encode(['address'=>$addr,'balance_wei'=>$wei,'balance'=>bcdiv(hexdec($wei),'1000000000000000000',4)]);
                break;
              case 'tx':
                $hash=$_GET['hash']??'';
                $tx=rpc('eth_getTransactionByHash',[$hash]);
                echo json_encode($tx['result']??null);
                break;
              default:
                echo '{"error":"unknown action","actions":["status","block","blocks","balance","tx"]}';
            }
            API

            # Explorer: สวยงาม HTML frontend ดึงข้อมูลจาก API
            cat > "$EXPLORER/public_html/index.html" << 'HTML'
            <!DOCTYPE html>
            <html lang="en">
            <head>
            <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
            <title>TPIX Chain Explorer</title>
            <style>
            *{margin:0;padding:0;box-sizing:border-box}
            body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}
            .header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);padding:20px 0;border-bottom:1px solid rgba(255,255,255,0.1)}
            .container{max-width:1200px;margin:0 auto;padding:0 20px}
            .logo{display:flex;align-items:center;gap:12px}
            .logo h1{font-size:24px;font-weight:700}.logo h1 span{color:#06b6d4}
            .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin:24px 0}
            .stat{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:20px;text-align:center}
            .stat .value{font-size:28px;font-weight:700;color:#06b6d4}
            .stat .label{font-size:12px;color:#94a3b8;margin-top:4px;text-transform:uppercase;letter-spacing:1px}
            .section{margin:24px 0}
            .section h2{font-size:18px;margin-bottom:16px;color:#e2e8f0}
            .table{width:100%;border-collapse:collapse;background:rgba(255,255,255,0.03);border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,0.08)}
            .table th{text-align:left;padding:12px 16px;background:rgba(255,255,255,0.05);color:#94a3b8;font-size:12px;text-transform:uppercase;letter-spacing:1px}
            .table td{padding:12px 16px;border-top:1px solid rgba(255,255,255,0.05);font-size:14px}
            .table tr:hover td{background:rgba(6,182,212,0.05)}
            .mono{font-family:'Courier New',monospace;font-size:13px}
            .cyan{color:#06b6d4}.green{color:#10b981}.yellow{color:#f59e0b}
            .search{display:flex;gap:8px;margin:20px 0}
            .search input{flex:1;padding:12px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:#e2e8f0;font-size:14px;outline:none}
            .search input:focus{border-color:#06b6d4}
            .search button{padding:12px 24px;background:#06b6d4;color:#0f1117;border:none;border-radius:8px;font-weight:600;cursor:pointer}
            .footer{text-align:center;padding:40px;color:#475569;font-size:13px;border-top:1px solid rgba(255,255,255,0.05);margin-top:40px}
            .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
            .loading{text-align:center;padding:40px;color:#475569}
            @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}.loading{animation:pulse 2s infinite}
            a{color:#06b6d4;text-decoration:none}a:hover{text-decoration:underline}
            </style>
            </head>
            <body>
            <div class="header"><div class="container">
              <div class="logo"><div><h1>TPIX <span>Chain Explorer</span></h1><p style="color:#94a3b8;font-size:13px">Blockchain Explorer for TPIX Network (Chain ID: 7000)</p></div></div>
              <div class="search"><input id="searchInput" placeholder="Search by address (0x...) or block number..." onkeypress="if(event.key==='Enter')doSearch()"><button onclick="doSearch()">Search</button></div>
            </div></div>
            <div class="container">
              <div class="stats">
                <div class="stat"><div class="value" id="blockNum">...</div><div class="label">Latest Block</div></div>
                <div class="stat"><div class="value cyan">7000</div><div class="label">Chain ID</div></div>
                <div class="stat"><div class="value green">TPIX</div><div class="label">Native Coin</div></div>
                <div class="stat"><div class="value yellow">2s</div><div class="label">Block Time</div></div>
              </div>
              <div id="searchResults"></div>
              <div class="section"><h2>Latest Blocks</h2><div id="blocksTable" class="loading">Loading blocks...</div></div>
            </div>
            <div class="footer">
              <p>TPIX Chain Explorer &middot; Powered by <a href="https://tpix.online" target="_blank">TPIX TRADE</a> &middot; <a href="https://rpc.tpix.online" target="_blank">RPC</a></p>
              <p style="margin-top:8px">Developed by <a href="https://xmanstudio.com" target="_blank">Xman Studio</a></p>
            </div>
            <script>
            const API='/api.php';
            async function fetchAPI(action,params={}){
              const qs=new URLSearchParams({action,...params}).toString();
              const r=await fetch(API+'?'+qs);return r.json();
            }
            function shortAddr(a){return a?a.slice(0,10)+'...'+a.slice(-6):'-'}
            function hexToNum(h){return parseInt(h,16)||0}
            function weiToTPIX(w){return(hexToNum(w)/1e18).toFixed(4)}
            function timeAgo(ts){const s=Math.floor(Date.now()/1000)-hexToNum(ts);if(s<60)return s+'s ago';if(s<3600)return Math.floor(s/60)+'m ago';return Math.floor(s/3600)+'h ago'}

            async function loadStatus(){
              const s=await fetchAPI('status');
              document.getElementById('blockNum').textContent=s.block_number?.toLocaleString()||'0';
            }

            async function loadBlocks(){
              const blocks=await fetchAPI('blocks',{count:15});
              if(!blocks||!blocks.length){document.getElementById('blocksTable').innerHTML='<p>No blocks yet</p>';return}
              let html='<table class="table"><thead><tr><th>Block</th><th>Time</th><th>Txns</th><th>Miner</th><th>Gas Used</th></tr></thead><tbody>';
              blocks.forEach(b=>{
                html+='<tr><td class="cyan mono">#'+hexToNum(b.number)+'</td><td>'+timeAgo(b.timestamp)+'</td><td>'+(b.transactions?.length||0)+'</td><td class="mono">'+shortAddr(b.miner)+'</td><td>'+hexToNum(b.gasUsed).toLocaleString()+'</td></tr>';
              });
              html+='</tbody></table>';
              document.getElementById('blocksTable').innerHTML=html;
            }

            async function doSearch(){
              const q=document.getElementById('searchInput').value.trim();
              const el=document.getElementById('searchResults');
              if(!q){el.innerHTML='';return}
              if(q.startsWith('0x')&&q.length===42){
                const b=await fetchAPI('balance',{address:q});
                el.innerHTML='<div class="section"><h2>Address: <span class="cyan mono">'+q+'</span></h2><div class="stat" style="display:inline-block"><div class="value">'+b.balance+' TPIX</div><div class="label">Balance</div></div></div>';
              }else if(!isNaN(q)){
                const b=await fetchAPI('block',{number:q});
                if(b){el.innerHTML='<div class="section"><h2>Block #'+hexToNum(b.number)+'</h2><p>Hash: <span class="mono cyan">'+b.hash+'</span></p><p>Txns: '+b.transactions?.length+' | Gas: '+hexToNum(b.gasUsed)+' | Miner: <span class="mono">'+shortAddr(b.miner)+'</span></p></div>';}
                else{el.innerHTML='<p>Block not found</p>';}
              }else{el.innerHTML='<p>Enter address (0x...) or block number</p>';}
            }

            loadStatus();loadBlocks();
            setInterval(()=>{loadStatus();loadBlocks()},5000);
            </script>
            </body>
            </html>
            HTML

            # RPC proxy
            if [ -d "$RPC_DIR" ]; then
              mkdir -p "$RPC_DIR/public_html"
              cat > "$RPC_DIR/public_html/.htaccess" << 'HA2'
            RewriteEngine On
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteRule ^(.*)$ index.php [L,QSA]
            HA2
              cat > "$RPC_DIR/public_html/index.php" << 'RPC'
            <?php
            header('Access-Control-Allow-Origin: *');
            header('Access-Control-Allow-Methods: POST, GET, OPTIONS');
            header('Access-Control-Allow-Headers: Content-Type');
            if ($_SERVER['REQUEST_METHOD']==='OPTIONS'){http_response_code(204);exit;}
            $ch = curl_init('http://127.0.0.1:8545');
            curl_setopt_array($ch,[CURLOPT_RETURNTRANSFER=>true,CURLOPT_TIMEOUT=>30,CURLOPT_HTTPHEADER=>['Content-Type: application/json']]);
            if ($_SERVER['REQUEST_METHOD']==='POST'){curl_setopt($ch,CURLOPT_POST,true);curl_setopt($ch,CURLOPT_POSTFIELDS,file_get_contents('php://input'));}
            $r=curl_exec($ch);$code=curl_getinfo($ch,CURLINFO_HTTP_CODE);curl_close($ch);
            if($r===false){http_response_code(502);header('Content-Type: application/json');echo '{"jsonrpc":"2.0","error":{"code":-32000,"message":"RPC unavailable"},"id":null}';exit;}
            http_response_code($code);header('Content-Type: application/json');echo $r;
            RPC
            fi

            # === Final status ===
            echo ""
            echo "=== STATUS ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            echo ""
            FINAL_BLOCK=$(curl -s http://127.0.0.1:8545 -X POST -H "Content-Type: application/json" -d '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' 2>/dev/null)
            echo "Block: $FINAL_BLOCK"
            FINAL_BAL=$(curl -s http://127.0.0.1:8545 -X POST -H "Content-Type: application/json" -d "{\"jsonrpc\":\"2.0\",\"method\":\"eth_getBalance\",\"params\":[\"${VALIDATOR_ADDR}\",\"latest\"],\"id\":1}" 2>/dev/null)
            echo "Balance: $FINAL_BAL"
            EXPLORER_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://explorer.tpix.online/ 2>/dev/null)
            echo "Explorer: HTTP $EXPLORER_STATUS"
            API_STATUS=$(curl -s "https://explorer.tpix.online/api.php?action=status" 2>/dev/null)
            echo "Explorer API: $API_STATUS"
            echo ""
            echo "Validator: $VALIDATOR_ADDR"
            echo "Explorer: https://explorer.tpix.online"
            echo "RPC: https://rpc.tpix.online"
            echo "=== DONE ==="
