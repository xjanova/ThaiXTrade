name: Deploy Token Factory V2 + NFT Factory
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Compile contracts on runner
        run: |
          npm init -y
          npm pkg set type=module
          npm install hardhat@2 '@nomicfoundation/hardhat-toolbox@hh2' '@openzeppelin/contracts@^5.0.0' ethers@6

          cat > hardhat.config.cjs << 'EOF'
          require("@nomicfoundation/hardhat-toolbox");
          module.exports = {
            solidity: {
              compilers: [
                { version: "0.8.24", settings: { optimizer: { enabled: true, runs: 200 }, evmVersion: "cancun", viaIR: true } },
                { version: "0.8.20", settings: { optimizer: { enabled: true, runs: 200 }, evmVersion: "paris" } },
              ],
            },
            paths: { sources: "./contracts", cache: "./cache", artifacts: "./artifacts" },
          };
          EOF

          npx hardhat compile --config hardhat.config.cjs

          # Extract minimal artifacts (ABI + bytecode only) into workspace
          mkdir -p factory-artifacts
          node -e "
            const fs = require('fs');
            const v2 = JSON.parse(fs.readFileSync('artifacts/contracts/factory/TPIXTokenFactoryV2.sol/TPIXTokenFactoryV2.json'));
            const nft = JSON.parse(fs.readFileSync('artifacts/contracts/factory/TPIXNFTFactory.sol/TPIXNFTFactory.json'));
            fs.writeFileSync('factory-artifacts/TPIXTokenFactoryV2.json', JSON.stringify({ abi: v2.abi, bytecode: v2.bytecode }));
            fs.writeFileSync('factory-artifacts/TPIXNFTFactory.json', JSON.stringify({ abi: nft.abi, bytecode: nft.bytecode }));
            console.log('V2 bytecode:', Math.round(v2.bytecode.length / 2), 'bytes');
            console.log('NFT bytecode:', Math.round(nft.bytecode.length / 2), 'bytes');
          "
          ls -la factory-artifacts/
          echo "✅ Contracts compiled and artifacts extracted"

      - name: Upload artifacts to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "factory-artifacts/*"
          target: "/tmp/factory-deploy"
          strip_components: 1

      - name: Deploy to TPIX Chain via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 5m
          script: |
            set -e
            echo "=== Deploy Token Factory V2 + NFT Factory — $(date) ==="

            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            DEPLOY_PATH="${DEPLOY_PATH:-/home/admin/domains/tpix.online}"

            # 1. Extract validator private key
            echo "[1/3] Extracting deployer key..."
            PRIVATE_KEY=$(docker exec tpix-chain-node cat /data/consensus/validator.key 2>/dev/null || echo "")
            if [ -z "$PRIVATE_KEY" ]; then
              echo "ERROR: Cannot extract validator private key"
              exit 1
            fi
            echo "✅ Deployer key loaded"

            # Verify artifacts were uploaded
            ls -la /tmp/factory-deploy/TPIXTokenFactoryV2.json
            ls -la /tmp/factory-deploy/TPIXNFTFactory.json

            # 2. Deploy using Node.js directly on server (ethers available in app)
            echo "[2/3] Deploying contracts..."
            echo "Node version: $(node --version)"

            # Create inline deploy script using CommonJS (server may not support ESM)
            export DEPLOYER_KEY="$PRIVATE_KEY"
            export V2_ARTIFACT="/tmp/factory-deploy/TPIXTokenFactoryV2.json"
            export NFT_ARTIFACT="/tmp/factory-deploy/TPIXNFTFactory.json"

            DEPLOY_OUTPUT=$(cd "$DEPLOY_PATH" && node -e '
              const { ethers } = require("ethers");
              const fs = require("fs");

              async function main() {
                const rpc = "http://127.0.0.1:8545";
                const privateKey = process.env.DEPLOYER_KEY;
                const provider = new ethers.JsonRpcProvider(rpc, { chainId: 4289, name: "TPIX Chain" });
                const wallet = new ethers.Wallet(privateKey, provider);
                console.log("Deployer:", wallet.address);
                console.log("Balance:", ethers.formatEther(await provider.getBalance(wallet.address)), "TPIX");

                const block = await provider.getBlock("latest");
                console.log("Block gas limit:", block.gasLimit.toString());

                const v2Art = JSON.parse(fs.readFileSync(process.env.V2_ARTIFACT, "utf8"));
                const nftArt = JSON.parse(fs.readFileSync(process.env.NFT_ARTIFACT, "utf8"));

                console.log("\n[1/2] Deploying TPIXTokenFactoryV2...");
                const v2Factory = new ethers.ContractFactory(v2Art.abi, v2Art.bytecode, wallet);
                const v2 = await v2Factory.deploy({ gasPrice: 0 });
                const v2Receipt = await v2.deploymentTransaction().wait();
                const v2Addr = await v2.getAddress();
                console.log("TPIXTokenFactoryV2:", v2Addr);
                console.log("  Gas used:", v2Receipt.gasUsed.toString());

                console.log("\n[2/2] Deploying TPIXNFTFactory...");
                const nftFactory = new ethers.ContractFactory(nftArt.abi, nftArt.bytecode, wallet);
                const nft = await nftFactory.deploy({ gasPrice: 0 });
                const nftReceipt = await nft.deploymentTransaction().wait();
                const nftAddr = await nft.getAddress();
                console.log("TPIXNFTFactory:", nftAddr);
                console.log("  Gas used:", nftReceipt.gasUsed.toString());

                const v2Contract = new ethers.Contract(v2Addr, v2Art.abi, provider);
                const nftContract = new ethers.Contract(nftAddr, nftArt.abi, provider);
                console.log("\nVerification:");
                console.log("  V2 owner:", await v2Contract.owner());
                console.log("  V2 totalTokens:", (await v2Contract.totalTokens()).toString());
                console.log("  NFT owner:", await nftContract.owner());
                console.log("  NFT totalNFTs:", (await nftContract.totalNFTs()).toString());

                console.log("\nTOKEN_FACTORY_V2_ADDRESS=" + v2Addr);
                console.log("NFT_FACTORY_ADDRESS=" + nftAddr);
              }

              main().catch(e => { console.error("Deploy failed:", e.message || e); if (e.info) console.error("Info:", JSON.stringify(e.info)); process.exit(1); });
            ' 2>&1)

            echo "$DEPLOY_OUTPUT"

            V2_ADDR=$(echo "$DEPLOY_OUTPUT" | grep "^TOKEN_FACTORY_V2_ADDRESS=" | tail -1 | cut -d'=' -f2)
            NFT_ADDR=$(echo "$DEPLOY_OUTPUT" | grep "^NFT_FACTORY_ADDRESS=" | tail -1 | cut -d'=' -f2)

            if [ -z "$V2_ADDR" ] || [ -z "$NFT_ADDR" ]; then
              echo "ERROR: Failed to extract deployed addresses"
              exit 1
            fi

            # 3. Update .env
            echo "[3/3] Updating .env..."
            cd "$DEPLOY_PATH"
            cp .env .env.backup.factory-v2.$(date +%Y%m%d_%H%M%S)

            for VAR in TOKEN_FACTORY_V2_ADDRESS NFT_FACTORY_ADDRESS; do
              VAL=$(eval echo \$$VAR)
              if grep -q "^${VAR}=" .env; then
                sed -i "s|^${VAR}=.*|${VAR}=$VAL|" .env
              else
                echo "${VAR}=$VAL" >> .env
              fi
            done

            php artisan config:clear 2>/dev/null || true
            php artisan config:cache 2>/dev/null || true

            # Cleanup
            rm -rf /tmp/factory-deploy

            echo ""
            echo "═══════════════════════════════════════════"
            echo " Factory V2 Deployment Complete!"
            echo "═══════════════════════════════════════════"
            echo " TOKEN_FACTORY_V2_ADDRESS=$V2_ADDR"
            echo " NFT_FACTORY_ADDRESS=$NFT_ADDR"
            echo " Explorer: https://explorer.tpix.online/address/$V2_ADDR"
            echo " Explorer: https://explorer.tpix.online/address/$NFT_ADDR"
            echo "═══════════════════════════════════════════"
