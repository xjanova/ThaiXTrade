name: Deploy Token Factory V2 + NFT Factory
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Factories to TPIX Chain
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 15m
          script: |
            set -e
            echo "=== Deploy Token Factory V2 + NFT Factory — $(date) ==="

            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            DEPLOY_PATH="${DEPLOY_PATH:-/home/admin/domains/tpix.online}"
            INFRA="$HOME/tpix-infrastructure"
            WORK="$INFRA/deploy-factory-v2"
            mkdir -p "$WORK"

            # ──────────────────────────────────────────
            #  1. Extract validator private key
            # ──────────────────────────────────────────
            echo "[1/5] Extracting deployer key..."
            PRIVATE_KEY=$(docker exec tpix-chain-node cat /data/consensus/validator.key 2>/dev/null || echo "")
            if [ -z "$PRIVATE_KEY" ]; then
              echo "ERROR: Cannot extract validator private key from container"
              exit 1
            fi
            echo "✅ Deployer key loaded"

            SECRETS_OUT=$(docker exec tpix-chain-node /polygon-edge secrets output --data-dir /data 2>&1 || true)
            VALIDATOR_ADDR=$(echo "$SECRETS_OUT" | grep "Public key (address)" | awk -F'= ' '{print $2}' | tr -d '[:space:]')
            echo "Deployer: $VALIDATOR_ADDR"

            # ──────────────────────────────────────────
            #  2. Copy contracts + deploy script from app
            # ──────────────────────────────────────────
            echo "[2/5] Setting up Hardhat project..."
            cd "$WORK"
            # Clean previous artifacts (may be owned by root from Docker)
            docker run --rm -v "$WORK:/app" alpine rm -rf /app/contracts /app/artifacts /app/cache /app/node_modules /app/deploy.mjs /app/hardhat.config.cjs /app/package.json /app/package-lock.json

            # Copy sources from deployed app
            cp -r "$DEPLOY_PATH/contracts" ./contracts
            cp "$DEPLOY_PATH/scripts/deploy/deploy-factory-v2-remote.mjs" ./deploy.mjs

            # ──────────────────────────────────────────
            #  3. Compile contracts in Docker
            # ──────────────────────────────────────────
            echo "[3/5] Compiling contracts..."

            cat > hardhat.config.cjs << 'HARDHAT'
            require("@nomicfoundation/hardhat-toolbox");
            module.exports = {
              solidity: {
                compilers: [
                  {
                    version: "0.8.24",
                    settings: {
                      optimizer: { enabled: true, runs: 200 },
                      evmVersion: "cancun",
                      viaIR: true,
                    },
                  },
                  {
                    version: "0.8.20",
                    settings: {
                      optimizer: { enabled: true, runs: 200 },
                      evmVersion: "paris",
                    },
                  },
                ],
              },
              paths: {
                sources: "./contracts",
                cache: "./cache",
                artifacts: "./artifacts",
              },
            };
            HARDHAT

            docker run --rm \
              -v "$WORK:/app" \
              -w /app \
              node:22-alpine \
              sh -c "
                npm init -y > /dev/null 2>&1
                npm pkg set type=module > /dev/null 2>&1
                npm install hardhat@2 '@nomicfoundation/hardhat-toolbox@hh2' '@openzeppelin/contracts@^5.0.0' ethers@6 > /dev/null 2>&1
                npx hardhat compile --config hardhat.config.cjs 2>&1
              "

            if [ ! -f "artifacts/contracts/factory/TPIXTokenFactoryV2.sol/TPIXTokenFactoryV2.json" ]; then
              echo "ERROR: TPIXTokenFactoryV2 artifact not found"
              exit 1
            fi
            echo "✅ Contracts compiled"

            # ──────────────────────────────────────────
            #  4. Deploy via ethers.js
            # ──────────────────────────────────────────
            echo "[4/5] Deploying contracts..."

            DEPLOY_OUTPUT=$(docker run --rm \
              --network host \
              -e DEPLOYER_KEY="$PRIVATE_KEY" \
              -v "$WORK:/app" \
              -w /app \
              node:22-alpine \
              sh -c "npm install ethers@6 > /dev/null 2>&1 && node deploy.mjs" 2>&1)

            echo "$DEPLOY_OUTPUT"

            # Extract addresses
            V2_ADDR=$(echo "$DEPLOY_OUTPUT" | grep "^TOKEN_FACTORY_V2_ADDRESS=" | tail -1 | cut -d'=' -f2)
            NFT_ADDR=$(echo "$DEPLOY_OUTPUT" | grep "^NFT_FACTORY_ADDRESS=" | tail -1 | cut -d'=' -f2)

            if [ -z "$V2_ADDR" ] || [ -z "$NFT_ADDR" ]; then
              echo "ERROR: Failed to extract deployed addresses"
              echo "V2_ADDR=$V2_ADDR NFT_ADDR=$NFT_ADDR"
              exit 1
            fi

            # ──────────────────────────────────────────
            #  5. Update .env on production server
            # ──────────────────────────────────────────
            echo "[5/5] Updating .env..."
            cd "$DEPLOY_PATH"

            cp .env .env.backup.factory-v2.$(date +%Y%m%d_%H%M%S)

            if grep -q '^TOKEN_FACTORY_V2_ADDRESS=' .env 2>/dev/null; then
              sed -i "s|^TOKEN_FACTORY_V2_ADDRESS=.*|TOKEN_FACTORY_V2_ADDRESS=$V2_ADDR|" .env
            else
              echo "TOKEN_FACTORY_V2_ADDRESS=$V2_ADDR" >> .env
            fi

            if grep -q '^NFT_FACTORY_ADDRESS=' .env 2>/dev/null; then
              sed -i "s|^NFT_FACTORY_ADDRESS=.*|NFT_FACTORY_ADDRESS=$NFT_ADDR|" .env
            else
              echo "NFT_FACTORY_ADDRESS=$NFT_ADDR" >> .env
            fi

            php artisan config:clear 2>/dev/null || true
            php artisan config:cache 2>/dev/null || true

            echo ""
            echo "═══════════════════════════════════════════"
            echo " Factory V2 Deployment Complete!"
            echo "═══════════════════════════════════════════"
            echo " TOKEN_FACTORY_V2_ADDRESS=$V2_ADDR"
            echo " NFT_FACTORY_ADDRESS=$NFT_ADDR"
            echo "═══════════════════════════════════════════"

            # Cleanup (Docker-owned files need root)
            docker run --rm -v "$WORK:/app" alpine rm -rf /app/contracts /app/artifacts /app/cache /app/node_modules
            rm -rf "$WORK" 2>/dev/null || true
