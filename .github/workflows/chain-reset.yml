name: Reset TPIX Chain (Emergency)
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type RESET to confirm full chain reset with 4 validators'
        required: true

jobs:
  regenesis:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'RESET' }}
    steps:
      - name: Re-Genesis TPIX Chain — 4 Validators
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 15m
          script: |
            set -e
            echo "=== TPIX Re-Genesis 4 Validators — $(date) ==="
            INFRA="$HOME/tpix-infrastructure"
            CHAIN="$INFRA/tpix-chain"
            IMG="0xpolygon/polygon-edge:0.9.0"

            echo "[1/8] Stopping containers..."
            cd "$INFRA"
            docker compose down 2>/dev/null || true

            echo "[2/8] Backup..."
            BACKUP="$HOME/tpix-backup-$(date +%Y%m%d-%H%M%S)"
            mkdir -p "$BACKUP"
            cp -r "$CHAIN/data" "$BACKUP/" 2>/dev/null || true
            cp "$CHAIN/genesis.json" "$BACKUP/" 2>/dev/null || true

            echo "[3/8] Wipe data..."
            docker run --rm -v "$CHAIN:/chain" alpine sh -c "rm -rf /chain/data /chain/genesis.json && mkdir -p /chain"
            mkdir -p "$CHAIN"

            echo "[4/8] Generate 4 validator keys..."
            for i in 1 2 3 4; do
              echo "  Generating validator $i..."
              docker run --rm -v "$CHAIN:/chain" $IMG secrets init --data-dir /chain/data/validator-${i} --insecure 2>&1 || { echo "secrets init failed for validator $i"; exit 1; }
            done
            echo "  Extracting addresses and node IDs..."
            ADDR1=$(docker run --rm -v "$CHAIN:/chain" $IMG secrets output --data-dir /chain/data/validator-1 2>&1 | grep "Public key (address)" | awk -F'= ' '{print $2}' | tr -d '[:space:]')
            ADDR2=$(docker run --rm -v "$CHAIN:/chain" $IMG secrets output --data-dir /chain/data/validator-2 2>&1 | grep "Public key (address)" | awk -F'= ' '{print $2}' | tr -d '[:space:]')
            ADDR3=$(docker run --rm -v "$CHAIN:/chain" $IMG secrets output --data-dir /chain/data/validator-3 2>&1 | grep "Public key (address)" | awk -F'= ' '{print $2}' | tr -d '[:space:]')
            ADDR4=$(docker run --rm -v "$CHAIN:/chain" $IMG secrets output --data-dir /chain/data/validator-4 2>&1 | grep "Public key (address)" | awk -F'= ' '{print $2}' | tr -d '[:space:]')
            NID1=$(docker run --rm -v "$CHAIN:/chain" $IMG secrets output --data-dir /chain/data/validator-1 2>&1 | grep "Node ID" | awk -F'= ' '{print $2}' | tr -d '[:space:]')
            NID2=$(docker run --rm -v "$CHAIN:/chain" $IMG secrets output --data-dir /chain/data/validator-2 2>&1 | grep "Node ID" | awk -F'= ' '{print $2}' | tr -d '[:space:]')
            NID3=$(docker run --rm -v "$CHAIN:/chain" $IMG secrets output --data-dir /chain/data/validator-3 2>&1 | grep "Node ID" | awk -F'= ' '{print $2}' | tr -d '[:space:]')
            NID4=$(docker run --rm -v "$CHAIN:/chain" $IMG secrets output --data-dir /chain/data/validator-4 2>&1 | grep "Node ID" | awk -F'= ' '{print $2}' | tr -d '[:space:]')
            echo "V1=$ADDR1 V2=$ADDR2 V3=$ADDR3 V4=$ADDR4"
            echo "NID1=$NID1"
            test -n "$ADDR1" || { echo "ERROR: failed to get validator addresses"; exit 1; }
            test -n "$NID1" || { echo "ERROR: failed to get node IDs"; exit 1; }

            echo "[5/8] Generate genesis..."
            docker run --rm -v "$CHAIN/data/validator-1:/data/validator-1" -v "$CHAIN/data/validator-2:/data/validator-2" -v "$CHAIN/data/validator-3:/data/validator-3" -v "$CHAIN/data/validator-4:/data/validator-4" -v "$CHAIN:/chain" $IMG genesis --consensus ibft --ibft-validators-prefix-path /data/validator- --ibft-validator-type bls --chain-id 4289 --name tpix-chain --block-gas-limit 20000000 --epoch-size 100000 --block-time 2s --bootnode "/ip4/tpix-validator-1/tcp/10001/p2p/${NID1}" --bootnode "/ip4/tpix-validator-2/tcp/10001/p2p/${NID2}" --bootnode "/ip4/tpix-validator-3/tcp/10001/p2p/${NID3}" --bootnode "/ip4/tpix-validator-4/tcp/10001/p2p/${NID4}" --premine "0x2112b98e3ec5A252b7b2A8f02d498B64a2186A7f:1400000000000000000000000000" --premine "0xD2eAB07809921fcB36c7AB72D7B5D8D2C12A67d7:1710000000000000000000000000" --premine "0xf46131C82819d7621163F482b3fe88a228A7807c:700000000000000000000000000" --premine "0x3F8EB4046F5C79fd0D67C7547B5830cB2Cfb401A:700000000000000000000000000" --premine "0x3da3776e0AB0F442c181aa031f47FA83696859AF:1050000000000000000000000000" --premine "0xA945d1bE9c1DDeaE75BBb9B39981D1CE6Ed7d9d5:1400000000000000000000000000" --premine "${ADDR1}:10000000000000000000000000" --premine "${ADDR2}:10000000000000000000000000" --premine "${ADDR3}:10000000000000000000000000" --premine "${ADDR4}:10000000000000000000000000" --dir /chain/genesis.json
            test -f "$CHAIN/genesis.json" || { echo "ERROR: genesis not created"; exit 1; }
            echo "Genesis OK"

            echo "[6/8] Write docker-compose..."
            curl -sL "https://raw.githubusercontent.com/xjanova/TPIX-Coin/main/infrastructure/docker-compose-4v.yml" -o "$INFRA/docker-compose.yml"
            if [ ! -s "$INFRA/docker-compose.yml" ]; then
              echo "Download failed, using inline generation..."
              python3 -c "
            import json
            svc={}
            cmd='server --data-dir /data --chain /genesis.json --grpc-address 0.0.0.0:10000 --libp2p 0.0.0.0:10001 --jsonrpc 0.0.0.0:8545 --seal --max-slots 4096 --block-gas-target 20000000 --price-limit 0 --log-level INFO'
            for i in range(1,5):
              p=[f'127.0.0.1:{8544+i}:8545',f'{10000+i}:10001']
              if i==1: p=['127.0.0.1:8545:8545','127.0.0.1:10000:10000']+p
              svc[f'tpix-validator-{i}']={'image':'0xpolygon/polygon-edge:0.9.0','container_name':f'tpix-validator-{i}','restart':'always','ports':p,'volumes':[f'./tpix-chain/data/validator-{i}:/data','./tpix-chain/genesis.json:/genesis.json:ro'],'command':cmd,'mem_limit':'2g','networks':['tpix']}
            svc['tpix-validator-1']['healthcheck']={'test':['CMD-SHELL','polygon-edge status --grpc-address 127.0.0.1:10000 > /dev/null 2>&1'],'interval':'30s','timeout':'10s','retries':3,'start_period':'60s'}
            svc['blockscout-db']={'image':'postgres:16-alpine','container_name':'blockscout-db','restart':'unless-stopped','environment':{'POSTGRES_DB':'blockscout','POSTGRES_USER':'blockscout','POSTGRES_PASSWORD':'tpix_explorer_db_2026'},'volumes':['blockscout-db-data:/var/lib/postgresql/data'],'healthcheck':{'test':['CMD-SHELL','pg_isready -U blockscout'],'interval':'10s','timeout':'5s','retries':5},'networks':['tpix']}
            svc['blockscout-backend']={'image':'blockscout/blockscout:6.10.1','container_name':'blockscout-backend','restart':'unless-stopped','depends_on':{'blockscout-db':{'condition':'service_healthy'},'tpix-validator-1':{'condition':'service_healthy'}},'command':\"sh -c \\\"bin/blockscout eval 'Elixir.Explorer.ReleaseTasks.create_and_migrate()' && bin/blockscout start\\\"\",'mem_limit':'2g','environment':{'MIX_ENV':'prod','DATABASE_URL':'postgresql://blockscout:tpix_explorer_db_2026@blockscout-db:5432/blockscout','ETHEREUM_JSONRPC_VARIANT':'geth','ETHEREUM_JSONRPC_HTTP_URL':'http://tpix-validator-1:8545','CHAIN_ID':'4289','NETWORK':'TPIX Chain','COIN':'TPIX','COIN_NAME':'Thaiprompt Index','SECRET_KEY_BASE':'56OgMJny00smDFHkKNv27A7eBZmqaJPkWTp9HOYcR6M/Rij24bLey3qrB3PJFH3N','PORT':'4000','ECTO_USE_SSL':'false','API_V2_ENABLED':'true','POOL_SIZE':'20','INDEXER_DISABLE_INTERNAL_TRANSACTIONS_FETCHER':'true','INDEXER_DISABLE_BLOCK_REWARD_FETCHER':'true','INDEXER_DISABLE_WITHDRAWALS_FETCHER':'true','TXS_STATS_ENABLED':'true','SHOW_PRICE_CHART':'false','DISABLE_EXCHANGE_RATES':'true'},'ports':['127.0.0.1:4000:4000'],'networks':['tpix']}
            svc['blockscout-frontend']={'image':'ghcr.io/blockscout/frontend:v1.38.0','container_name':'blockscout-frontend','restart':'unless-stopped','depends_on':['blockscout-backend'],'environment':{'NEXT_PUBLIC_API_HOST':'explorer.tpix.online','NEXT_PUBLIC_API_PORT':'443','NEXT_PUBLIC_API_PROTOCOL':'https','NEXT_PUBLIC_APP_HOST':'explorer.tpix.online','NEXT_PUBLIC_APP_PROTOCOL':'https','NEXT_PUBLIC_APP_PORT':'443','NEXT_PUBLIC_NETWORK_NAME':'TPIX Chain','NEXT_PUBLIC_NETWORK_ID':'4289','NEXT_PUBLIC_NETWORK_RPC_URL':'https://rpc.tpix.online','NEXT_PUBLIC_NETWORK_CURRENCY_NAME':'TPIX','NEXT_PUBLIC_NETWORK_CURRENCY_SYMBOL':'TPIX','NEXT_PUBLIC_NETWORK_CURRENCY_DECIMALS':'18','NEXT_PUBLIC_IS_TESTNET':'false','NEXT_PUBLIC_COLOR_THEME_DEFAULT':'dark','NEXT_PUBLIC_PROMOTE_BLOCKSCOUT_IN_TITLE':'false','NEXT_PUBLIC_AD_BANNER_PROVIDER':'none','NEXT_PUBLIC_AD_TEXT_PROVIDER':'none'},'ports':['127.0.0.1:3100:3000'],'networks':['tpix']}
            dc={'services':svc,'volumes':{'blockscout-db-data':None},'networks':{'tpix':{'driver':'bridge'}}}
            with open('$INFRA/docker-compose.yml','w') as f:
              json.dump(dc,f,indent=2)
            "
            fi

            echo "[7/8] Starting services..."
            docker volume rm $(docker volume ls -q | grep blockscout-db) 2>/dev/null || true
            docker compose up -d tpix-validator-1 tpix-validator-2 tpix-validator-3 tpix-validator-4 blockscout-db
            echo "Wait 25s..."; sleep 25
            docker compose up -d blockscout-backend
            echo "Wait 15s..."; sleep 15
            docker compose up -d blockscout-frontend

            echo "[8/8] Verify..."
            for i in 1 2 3 4 5 6 7 8; do
              BLOCK=$(curl -s http://127.0.0.1:8545 -X POST -H "Content-Type: application/json" -d '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' 2>/dev/null | grep -o '"result":"[^"]*"' | cut -d'"' -f4)
              echo "Check $i: block=$BLOCK"
              [ "$BLOCK" != "0x0" ] && [ -n "$BLOCK" ] && echo "Chain OK!" && break
              sleep 5
            done
            echo "=== Balance Check ==="
            for P in "MNRewards:0x2112b98e3ec5A252b7b2A8f02d498B64a2186A7f" "Ecosystem:0xD2eAB07809921fcB36c7AB72D7B5D8D2C12A67d7" "Team:0xf46131C82819d7621163F482b3fe88a228A7807c" "TokenSale:0x3F8EB4046F5C79fd0D67C7547B5830cB2Cfb401A" "Liquidity:0x3da3776e0AB0F442c181aa031f47FA83696859AF" "Community:0xA945d1bE9c1DDeaE75BBb9B39981D1CE6Ed7d9d5"; do
              N="${P%%:*}"; A="${P##*:}"
              B=$(curl -s http://127.0.0.1:8545 -X POST -H "Content-Type: application/json" -d "{\"jsonrpc\":\"2.0\",\"method\":\"eth_getBalance\",\"params\":[\"${A}\",\"latest\"],\"id\":1}" 2>/dev/null | grep -o '"result":"[^"]*"' | cut -d'"' -f4)
              echo "  $N: $B"
            done
            docker ps --format "table {{.Names}}\t{{.Status}}"
            rm -f /tmp/tpix-restart-count /tmp/tpix-watchdog-restart-count
            echo "=== RE-GENESIS COMPLETE ==="
