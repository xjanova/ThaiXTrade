name: Debug Server Log
on:
  workflow_dispatch:

jobs:
  check-log:
    runs-on: ubuntu-latest
    steps:
      - name: Read Laravel error log & fix issues
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 3m
          script: |
            cd ~/domains/tpix.online

            echo "=== Create storage/fonts if missing ==="
            mkdir -p storage/fonts
            chmod 775 storage/fonts

            echo ""
            echo "=== Clear caches ==="
            php artisan config:clear 2>&1
            php artisan view:clear 2>&1
            php artisan cache:clear 2>&1

            echo ""
            echo "=== Check DomPDF config ==="
            php artisan tinker --execute="
              echo 'public_path: ' . config('dompdf.public_path', 'NOT SET') . PHP_EOL;
              echo 'font_dir: ' . config('dompdf.options.font_dir', 'NOT SET') . PHP_EOL;
              echo 'public_html exists: ' . (is_dir(base_path('public_html')) ? 'YES' : 'NO') . PHP_EOL;
              echo 'storage/fonts exists: ' . (is_dir(storage_path('fonts')) ? 'YES' : 'NO') . PHP_EOL;
            " 2>&1

            echo ""
            echo "=== Test whitepaper PDF render ==="
            php artisan tinker --execute="
              try {
                  \$pdf = \Barryvdh\DomPDF\Facade\Pdf::loadView('whitepaper.pdf', ['lang' => 'en'])
                      ->setPaper('a4')
                      ->setOption('isRemoteEnabled', true)
                      ->setOption('defaultFont', 'sans-serif')
                      ->setOption('isFontSubsettingEnabled', true);
                  \$pdf->render();
                  echo 'PDF OK, size: ' . strlen(\$pdf->output()) . ' bytes';
              } catch (\Throwable \$e) {
                  echo 'ERROR: ' . \$e->getMessage() . PHP_EOL;
                  echo 'File: ' . \$e->getFile() . ':' . \$e->getLine() . PHP_EOL;
                  echo 'Trace: ' . PHP_EOL . \$e->getTraceAsString();
              }
            " 2>&1

            echo ""
            echo "=== Last 50 lines of Laravel log (whitepaper errors) ==="
            grep -i "whitepaper\|dompdf\|Cannot resolve" storage/logs/laravel.log 2>/dev/null | tail -20 || echo "No whitepaper errors found"

            echo ""
            echo "=== Check storage/fonts dir ==="
            ls -la storage/fonts/ 2>/dev/null || echo "No fonts dir"
