name: Deploy WTPIX Contract
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy WTPIX to TPIX Chain
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 5m
          script: |
            echo "=== Deploy WTPIX (Wrapped TPIX) ==="

            INFRA="$HOME/tpix-infrastructure"
            CHAIN="$INFRA/tpix-chain"
            DEPLOY_DIR="$INFRA/deploy-wtpix"
            mkdir -p "$DEPLOY_DIR"

            # Read validator private key (hex format)
            VALIDATOR_KEY_FILE="$CHAIN/data/consensus/validator.key"
            if [ ! -f "$VALIDATOR_KEY_FILE" ]; then
              echo "ERROR: Validator key not found at $VALIDATOR_KEY_FILE"
              exit 1
            fi
            PRIVATE_KEY=$(cat "$VALIDATOR_KEY_FILE")
            echo "Validator key loaded"

            # Get validator address
            SECRETS_OUT=$(docker run --rm -v "$CHAIN/data:/data" 0xpolygon/polygon-edge:0.9.0 secrets output --data-dir /data 2>&1)
            VALIDATOR_ADDR=$(echo "$SECRETS_OUT" | grep "Public key (address)" | awk -F'= ' '{print $2}' | tr -d '[:space:]')
            echo "Deployer: $VALIDATOR_ADDR"

            # Check balance
            BAL=$(curl -s http://127.0.0.1:8545 -X POST -H "Content-Type: application/json" \
              -d "{\"jsonrpc\":\"2.0\",\"method\":\"eth_getBalance\",\"params\":[\"$VALIDATOR_ADDR\",\"latest\"],\"id\":1}" \
              | grep -o '"result":"[^"]*"' | cut -d'"' -f4)
            echo "Balance: $BAL"

            # Create deploy script using ethers.js in Docker
            cat > "$DEPLOY_DIR/deploy.mjs" << 'SCRIPT'
            import { ethers } from "ethers";

            // WTPIX contract — compiled bytecode (WETH9 pattern for TPIX Chain)
            // Solidity 0.8.20, optimizer 200 runs
            const WTPIX_ABI = [
              "function name() view returns (string)",
              "function symbol() view returns (string)",
              "function decimals() view returns (uint8)",
              "function totalSupply() view returns (uint256)",
              "function balanceOf(address) view returns (uint256)",
              "function deposit() payable",
              "function withdraw(uint256)",
              "function approve(address,uint256) returns (bool)",
              "function transfer(address,uint256) returns (bool)",
              "function transferFrom(address,address,uint256) returns (bool)",
              "event Deposit(address indexed, uint256)",
              "event Withdrawal(address indexed, uint256)",
              "event Transfer(address indexed, address indexed, uint256)",
              "event Approval(address indexed, address indexed, uint256)"
            ];

            // WTPIX bytecode — compiled from contracts/tpix-chain/WTPIX.sol
            // Solidity 0.8.26, optimizer 200 runs
            const WTPIX_BYTECODE = "";

            async function main() {
              const rpc = "http://127.0.0.1:8545";
              const privateKey = process.env.DEPLOYER_KEY;

              if (!privateKey) {
                console.error("ERROR: DEPLOYER_KEY not set");
                process.exit(1);
              }

              const provider = new ethers.JsonRpcProvider(rpc, { chainId: 4289, name: "TPIX Chain" });
              const wallet = new ethers.Wallet(privateKey, provider);
              console.log("Deployer:", wallet.address);

              const balance = await provider.getBalance(wallet.address);
              console.log("Balance:", ethers.formatEther(balance), "TPIX");

              // Deploy WTPIX
              console.log("Deploying WTPIX...");
              const factory = new ethers.ContractFactory(WTPIX_ABI, WTPIX_BYTECODE, wallet);
              const contract = await factory.deploy({ gasPrice: 0, gasLimit: 2000000 });
              await contract.waitForDeployment();

              const addr = await contract.getAddress();
              console.log("WTPIX deployed at:", addr);

              // Wrap 1,000 TPIX so token shows on explorer
              console.log("Wrapping 1,000 TPIX...");
              const tx = await contract.deposit({ value: ethers.parseEther("1000"), gasPrice: 0, gasLimit: 100000 });
              await tx.wait();
              console.log("Wrapped 1,000 TPIX -> WTPIX");

              const wtpixBal = await contract.balanceOf(wallet.address);
              console.log("WTPIX balance:", ethers.formatEther(wtpixBal));

              console.log("\n=== WTPIX Deployment Complete ===");
              console.log("Contract:", addr);
              console.log("Explorer: https://explorer.tpix.online/address/" + addr);
            }

            main().catch(e => { console.error(e); process.exit(1); });
            SCRIPT

            # Run deploy script using Node.js Docker image with ethers.js
            echo "Running deploy script in Docker..."
            docker run --rm \
              --network host \
              -e DEPLOYER_KEY="$PRIVATE_KEY" \
              -v "$DEPLOY_DIR:/app" \
              -w /app \
              node:20-alpine \
              sh -c "npm init -y > /dev/null 2>&1 && npm install ethers@6 > /dev/null 2>&1 && node deploy.mjs"

            echo ""
            echo "=== DONE ==="
