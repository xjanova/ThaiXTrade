name: Re-Genesis TPIX Chain (4 Validators + Whitepaper Allocation)
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type REGENESIS to confirm full chain reset with 4 validators'
        required: true

jobs:
  regenesis:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'REGENESIS' }}
    steps:
      - name: Re-Genesis TPIX Chain
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 15m
          script: |
            echo "=== TPIX Chain Re-Genesis — 4 Validators — $(date) ==="

            INFRA="$HOME/tpix-infrastructure"
            CHAIN="$INFRA/tpix-chain"
            IMG="0xpolygon/polygon-edge:0.9.0"

            # === Step 1: Stop everything ===
            echo "[1/8] Stopping all containers..."
            cd "$INFRA"
            docker compose down 2>/dev/null || true
            echo "All containers stopped"

            # === Step 2: Backup ===
            echo "[2/8] Backing up old data..."
            BACKUP_DIR="$HOME/tpix-chain-backup-$(date +%Y%m%d-%H%M%S)"
            cp -r "$CHAIN/data" "$BACKUP_DIR" 2>/dev/null || true
            cp "$CHAIN/genesis.json" "$BACKUP_DIR/genesis.json.bak" 2>/dev/null || true
            echo "Backed up to $BACKUP_DIR"

            # === Step 3: Wipe data ===
            echo "[3/8] Wiping old chain data..."
            rm -rf "$CHAIN/data"
            rm -f "$CHAIN/genesis.json"
            mkdir -p "$CHAIN"

            # === Step 4: Generate 4 validator keys ===
            echo "[4/8] Generating 4 validator keys..."

            ADDRS=()
            NODE_IDS=()

            for i in 1 2 3 4; do
                DIR="$CHAIN/data/validator-${i}"
                mkdir -p "$DIR"

                docker run --rm -v "$DIR:/data" $IMG secrets init --data-dir /data --insecure

                SECRETS_OUT=$(docker run --rm -v "$DIR:/data" $IMG secrets output --data-dir /data 2>&1)

                ADDR=$(echo "$SECRETS_OUT" | grep "Public key (address)" | awk -F'= ' '{print $2}' | tr -d '[:space:]')
                NODE_ID=$(echo "$SECRETS_OUT" | grep "Node ID" | awk -F'= ' '{print $2}' | tr -d '[:space:]')

                ADDRS+=("$ADDR")
                NODE_IDS+=("$NODE_ID")

                echo "Validator $i: $ADDR (node: ${NODE_ID:0:20}...)"

                if [ -z "$ADDR" ] || [ -z "$NODE_ID" ]; then
                    echo "ERROR: Failed to get validator $i info!"
                    exit 1
                fi
            done

            # === Step 5: Generate genesis ===
            echo "[5/8] Generating genesis.json..."

            docker run --rm \
                -v "$CHAIN/data/validator-1:/data/validator-1" \
                -v "$CHAIN/data/validator-2:/data/validator-2" \
                -v "$CHAIN/data/validator-3:/data/validator-3" \
                -v "$CHAIN/data/validator-4:/data/validator-4" \
                -v "$CHAIN:/chain" \
                $IMG genesis \
                --consensus ibft \
                --ibft-validators-prefix-path /data/validator- \
                --ibft-validator-type bls \
                --chain-id 4289 \
                --name "tpix-chain" \
                --block-gas-limit 20000000 \
                --epoch-size 100000 \
                --block-time "2s" \
                --bootnode "/ip4/tpix-validator-1/tcp/10001/p2p/${NODE_IDS[0]}" \
                --bootnode "/ip4/tpix-validator-2/tcp/10001/p2p/${NODE_IDS[1]}" \
                --bootnode "/ip4/tpix-validator-3/tcp/10001/p2p/${NODE_IDS[2]}" \
                --bootnode "/ip4/tpix-validator-4/tcp/10001/p2p/${NODE_IDS[3]}" \
                --premine "0x2112b98e3ec5A252b7b2A8f02d498B64a2186A7f:1400000000000000000000000000" \
                --premine "0xD2eAB07809921fcB36c7AB72D7B5D8D2C12A67d7:1710000000000000000000000000" \
                --premine "0xf46131C82819d7621163F482b3fe88a228A7807c:700000000000000000000000000" \
                --premine "0x3F8EB4046F5C79fd0D67C7547B5830cB2Cfb401A:700000000000000000000000000" \
                --premine "0x3da3776e0AB0F442c181aa031f47FA83696859AF:1050000000000000000000000000" \
                --premine "0xA945d1bE9c1DDeaE75BBb9B39981D1CE6Ed7d9d5:1400000000000000000000000000" \
                --premine "${ADDRS[0]}:10000000000000000000000000" \
                --premine "${ADDRS[1]}:10000000000000000000000000" \
                --premine "${ADDRS[2]}:10000000000000000000000000" \
                --premine "${ADDRS[3]}:10000000000000000000000000" \
                --dir /chain/genesis.json

            if [ ! -f "$CHAIN/genesis.json" ]; then
                echo "ERROR: genesis.json not created!"
                exit 1
            fi
            echo "Genesis created!"

            # === Step 6: Update docker-compose for 4 validators ===
            echo "[6/8] Writing docker-compose.yml..."

            cat > "$INFRA/docker-compose.yml" << 'DCEOF'
            services:
              tpix-validator-1:
                image: 0xpolygon/polygon-edge:0.9.0
                container_name: tpix-validator-1
                restart: always
                ports:
                  - "127.0.0.1:8545:8545"
                  - "127.0.0.1:10000:10000"
                  - "10001:10001"
                volumes:
                  - ./tpix-chain/data/validator-1:/data
                  - ./tpix-chain/genesis.json:/genesis.json:ro
                command: server --data-dir /data --chain /genesis.json --grpc-address 0.0.0.0:10000 --libp2p 0.0.0.0:10001 --jsonrpc 0.0.0.0:8545 --seal --max-slots 4096 --block-gas-target 20000000 --price-limit 0 --log-level INFO
                healthcheck:
                  test: ["CMD-SHELL", "polygon-edge status --grpc-address 127.0.0.1:10000 > /dev/null 2>&1"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 60s
                mem_limit: 2g
                logging:
                  driver: json-file
                  options:
                    max-size: "50m"
                    max-file: "5"
                networks:
                  - tpix

              tpix-validator-2:
                image: 0xpolygon/polygon-edge:0.9.0
                container_name: tpix-validator-2
                restart: always
                ports:
                  - "127.0.0.1:8546:8545"
                  - "10002:10001"
                volumes:
                  - ./tpix-chain/data/validator-2:/data
                  - ./tpix-chain/genesis.json:/genesis.json:ro
                command: server --data-dir /data --chain /genesis.json --grpc-address 0.0.0.0:10000 --libp2p 0.0.0.0:10001 --jsonrpc 0.0.0.0:8545 --seal --max-slots 4096 --block-gas-target 20000000 --price-limit 0 --log-level INFO
                mem_limit: 2g
                logging:
                  driver: json-file
                  options:
                    max-size: "50m"
                    max-file: "5"
                networks:
                  - tpix

              tpix-validator-3:
                image: 0xpolygon/polygon-edge:0.9.0
                container_name: tpix-validator-3
                restart: always
                ports:
                  - "127.0.0.1:8547:8545"
                  - "10003:10001"
                volumes:
                  - ./tpix-chain/data/validator-3:/data
                  - ./tpix-chain/genesis.json:/genesis.json:ro
                command: server --data-dir /data --chain /genesis.json --grpc-address 0.0.0.0:10000 --libp2p 0.0.0.0:10001 --jsonrpc 0.0.0.0:8545 --seal --max-slots 4096 --block-gas-target 20000000 --price-limit 0 --log-level INFO
                mem_limit: 2g
                logging:
                  driver: json-file
                  options:
                    max-size: "50m"
                    max-file: "5"
                networks:
                  - tpix

              tpix-validator-4:
                image: 0xpolygon/polygon-edge:0.9.0
                container_name: tpix-validator-4
                restart: always
                ports:
                  - "127.0.0.1:8548:8545"
                  - "10004:10001"
                volumes:
                  - ./tpix-chain/data/validator-4:/data
                  - ./tpix-chain/genesis.json:/genesis.json:ro
                command: server --data-dir /data --chain /genesis.json --grpc-address 0.0.0.0:10000 --libp2p 0.0.0.0:10001 --jsonrpc 0.0.0.0:8545 --seal --max-slots 4096 --block-gas-target 20000000 --price-limit 0 --log-level INFO
                mem_limit: 2g
                logging:
                  driver: json-file
                  options:
                    max-size: "50m"
                    max-file: "5"
                networks:
                  - tpix

              blockscout-db:
                image: postgres:16-alpine
                container_name: blockscout-db
                restart: unless-stopped
                environment:
                  POSTGRES_DB: blockscout
                  POSTGRES_USER: blockscout
                  POSTGRES_PASSWORD: tpix_explorer_db_2026
                volumes:
                  - blockscout-db-data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U blockscout"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
                networks:
                  - tpix

              blockscout-backend:
                image: blockscout/blockscout:6.10.1
                container_name: blockscout-backend
                restart: unless-stopped
                depends_on:
                  blockscout-db:
                    condition: service_healthy
                  tpix-validator-1:
                    condition: service_healthy
                command: sh -c "bin/blockscout eval 'Elixir.Explorer.ReleaseTasks.create_and_migrate()' && bin/blockscout start"
                mem_limit: 2g
                logging:
                  driver: json-file
                  options:
                    max-size: "50m"
                    max-file: "3"
                environment:
                  MIX_ENV: prod
                  DATABASE_URL: postgresql://blockscout:tpix_explorer_db_2026@blockscout-db:5432/blockscout
                  ETHEREUM_JSONRPC_VARIANT: geth
                  ETHEREUM_JSONRPC_HTTP_URL: http://tpix-validator-1:8545
                  ETHEREUM_JSONRPC_WS_URL: ws://tpix-validator-1:8545/ws
                  ETHEREUM_JSONRPC_TRACE_URL: http://tpix-validator-1:8545
                  ETHEREUM_JSONRPC_HTTP_TIMEOUT: "30"
                  CHAIN_ID: "4289"
                  NETWORK: "TPIX Chain"
                  SUBNETWORK: "Mainnet"
                  COIN: "TPIX"
                  COIN_NAME: "Thaiprompt Index"
                  BLOCK_TRANSFORMER: base
                  SECRET_KEY_BASE: "56OgMJny00smDFHkKNv27A7eBZmqaJPkWTp9HOYcR6M/Rij24bLey3qrB3PJFH3N"
                  PORT: "4000"
                  ECTO_USE_SSL: "false"
                  API_V2_ENABLED: "true"
                  POOL_SIZE: "20"
                  INDEXER_DISABLE_INTERNAL_TRANSACTIONS_FETCHER: "true"
                  INDEXER_DISABLE_BLOCK_REWARD_FETCHER: "true"
                  INDEXER_DISABLE_WITHDRAWALS_FETCHER: "true"
                  INDEXER_COIN_BALANCES_BATCH_SIZE: "50"
                  COIN_BALANCE_ON_DEMAND_FETCHER_ENABLED: "true"
                  TOKEN_BALANCE_ON_DEMAND_FETCHER_ENABLED: "true"
                  TXS_STATS_ENABLED: "true"
                  SHOW_TXS_CHART: "true"
                  SHOW_PRICE_CHART: "false"
                  DISABLE_EXCHANGE_RATES: "true"
                ports:
                  - "127.0.0.1:4000:4000"
                networks:
                  - tpix

              blockscout-frontend:
                image: ghcr.io/blockscout/frontend:v1.38.0
                container_name: blockscout-frontend
                restart: unless-stopped
                depends_on:
                  - blockscout-backend
                environment:
                  NEXT_PUBLIC_API_HOST: explorer.tpix.online
                  NEXT_PUBLIC_API_PORT: "443"
                  NEXT_PUBLIC_API_PROTOCOL: https
                  NEXT_PUBLIC_API_WEBSOCKET_PROTOCOL: wss
                  NEXT_PUBLIC_APP_HOST: explorer.tpix.online
                  NEXT_PUBLIC_APP_PROTOCOL: https
                  NEXT_PUBLIC_APP_PORT: "443"
                  NEXT_PUBLIC_NETWORK_NAME: "TPIX Chain"
                  NEXT_PUBLIC_NETWORK_SHORT_NAME: "TPIX"
                  NEXT_PUBLIC_NETWORK_ID: "4289"
                  NEXT_PUBLIC_NETWORK_RPC_URL: "https://rpc.tpix.online"
                  NEXT_PUBLIC_NETWORK_CURRENCY_NAME: "TPIX"
                  NEXT_PUBLIC_NETWORK_CURRENCY_SYMBOL: "TPIX"
                  NEXT_PUBLIC_NETWORK_CURRENCY_DECIMALS: "18"
                  NEXT_PUBLIC_IS_TESTNET: "false"
                  NEXT_PUBLIC_NETWORK_LOGO: "https://tpix.online/images/logotpixexplorer.webp"
                  NEXT_PUBLIC_NETWORK_LOGO_DARK: "https://tpix.online/images/logotpixexplorer.webp"
                  NEXT_PUBLIC_NETWORK_ICON: "https://tpix.online/images/logotpixexplorer.webp"
                  NEXT_PUBLIC_NETWORK_ICON_DARK: "https://tpix.online/images/logotpixexplorer.webp"
                  NEXT_PUBLIC_COLOR_THEME_DEFAULT: "dark"
                  NEXT_PUBLIC_HOMEPAGE_CHARTS: "['daily_txs']"
                  NEXT_PUBLIC_WEB3_WALLETS: "['metamask']"
                  NEXT_PUBLIC_PROMOTE_BLOCKSCOUT_IN_TITLE: "false"
                  NEXT_PUBLIC_AD_BANNER_PROVIDER: "none"
                  NEXT_PUBLIC_AD_TEXT_PROVIDER: "none"
                ports:
                  - "127.0.0.1:3100:3000"
                networks:
                  - tpix

            volumes:
              blockscout-db-data:

            networks:
              tpix:
                driver: bridge
            DCEOF

            # === Step 7: Wipe Blockscout + Start ===
            echo "[7/8] Starting all services..."

            docker volume rm $(docker volume ls -q | grep blockscout-db) 2>/dev/null || true

            docker compose up -d tpix-validator-1 tpix-validator-2 tpix-validator-3 tpix-validator-4 blockscout-db
            echo "Waiting 20s for validators..."
            sleep 20

            docker compose up -d blockscout-backend
            echo "Waiting 15s for backend..."
            sleep 15

            docker compose up -d blockscout-frontend

            # === Step 8: Verify ===
            echo "[8/8] Verifying..."

            for i in 1 2 3 4 5 6 7 8; do
                BLOCK=$(curl -s http://127.0.0.1:8545 -X POST -H "Content-Type: application/json" \
                    -d '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' 2>/dev/null \
                    | grep -o '"result":"[^"]*"' | cut -d'"' -f4)
                echo "Check $i: block $BLOCK"
                if [ "$BLOCK" != "0x0" ] && [ -n "$BLOCK" ]; then
                    echo "Chain is producing blocks!"
                    break
                fi
                sleep 5
            done

            echo ""
            echo "=== Balance Check ==="
            for POOL in \
                "MN_Rewards:0x2112b98e3ec5A252b7b2A8f02d498B64a2186A7f" \
                "Ecosystem:0xD2eAB07809921fcB36c7AB72D7B5D8D2C12A67d7" \
                "Team:0xf46131C82819d7621163F482b3fe88a228A7807c" \
                "TokenSale:0x3F8EB4046F5C79fd0D67C7547B5830cB2Cfb401A" \
                "Liquidity:0x3da3776e0AB0F442c181aa031f47FA83696859AF" \
                "Community:0xA945d1bE9c1DDeaE75BBb9B39981D1CE6Ed7d9d5"; do
                NAME="${POOL%%:*}"
                ADDR="${POOL##*:}"
                BAL=$(curl -s http://127.0.0.1:8545 -X POST -H "Content-Type: application/json" \
                    -d "{\"jsonrpc\":\"2.0\",\"method\":\"eth_getBalance\",\"params\":[\"${ADDR}\",\"latest\"],\"id\":1}" 2>/dev/null \
                    | grep -o '"result":"[^"]*"' | cut -d'"' -f4)
                echo "  $NAME: $BAL"
            done

            echo ""
            docker ps --format "table {{.Names}}\t{{.Status}}"

            rm -f /tmp/tpix-restart-count /tmp/tpix-watchdog-restart-count

            echo ""
            echo "=== RE-GENESIS COMPLETE ==="
            echo "Explorer: https://explorer.tpix.online"
            echo "RPC: https://rpc.tpix.online"

