name: Build Android APK

on:
  push:
    branches: ['main', 'develop', 'claude/**']
    paths:
      - 'mobile/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: ['main']
    paths:
      - 'mobile/**'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release with APK'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: mobile/node_modules
          key: ${{ runner.os }}-mobile-node-${{ hashFiles('mobile/package-lock.json') }}
          restore-keys: ${{ runner.os }}-mobile-node-

      - name: Get version info
        id: version
        run: |
          if [ -f ../version.json ]; then
            VERSION=$(node -e "console.log(require('../version.json').version)")
            BUILD=$(node -e "console.log(require('../version.json').build || 1)")
          else
            VERSION="1.0.0"
            BUILD="1"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, Build: $BUILD"

      - name: Install dependencies
        run: npm ci

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK (Release)
        run: |
          cd android
          ./gradlew assembleRelease \
            -PversionName="${{ steps.version.outputs.version }}" \
            -PversionCode=${{ steps.version.outputs.build }}

      - name: Find and rename APK
        id: find-apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          APK_NAME="TPIX-TRADE-v${{ steps.version.outputs.version }}.apk"
          cp "$APK_PATH" "$APK_NAME"
          echo "apk_path=$APK_NAME" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          ls -lh "$APK_NAME"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TPIX-TRADE-v${{ steps.version.outputs.version }}
          path: mobile/${{ steps.find-apk.outputs.apk_path }}
          retention-days: 90

      - name: Create Release with APK
        if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || (github.event.inputs.create_release == 'true')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-v${{ steps.version.outputs.version }}-build${{ steps.version.outputs.build }}
          name: 'TPIX TRADE Mobile v${{ steps.version.outputs.version }}'
          body: |
            ## TPIX TRADE Mobile App v${{ steps.version.outputs.version }}

            **Build:** #${{ steps.version.outputs.build }}
            **Platform:** Android
            **Min SDK:** 24 (Android 7.0)

            ### Download & Install
            1. Download the APK file below
            2. Enable "Install from unknown sources" in your Android device settings
            3. Open the downloaded APK to install

            ### Features
            - Dashboard with portfolio overview
            - Real-time market data & price tracking
            - Trading interface with order book
            - Portfolio management
            - Glass morphism dark theme
            - Multi-chain support

            ### Tech Stack
            - React Native (Expo)
            - TypeScript
            - Zustand state management
          files: mobile/${{ steps.find-apk.outputs.apk_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        if: always()
        run: |
          echo "## Build Android APK" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** v${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Build:** #${{ steps.version.outputs.build }}" >> $GITHUB_STEP_SUMMARY
          if [ -f "${{ steps.find-apk.outputs.apk_path }}" ]; then
            SIZE=$(du -h "${{ steps.find-apk.outputs.apk_path }}" | cut -f1)
            echo "**APK Size:** $SIZE" >> $GITHUB_STEP_SUMMARY
            echo "**Status:** Success" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status:** Failed" >> $GITHUB_STEP_SUMMARY
          fi
