name: Build Android APK

on:
  push:
    branches: ['main', 'develop', 'claude/**']
    paths:
      - 'mobile/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: ['main']
    paths:
      - 'mobile/**'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release with APK'
        required: false
        default: 'true'
        type: boolean
      bump_version:
        description: 'Bump version (patch/minor/major/none)'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - none

permissions:
  contents: write

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: mobile/node_modules
          key: ${{ runner.os }}-mobile-node-${{ hashFiles('mobile/package-lock.json') }}
          restore-keys: ${{ runner.os }}-mobile-node-

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # Auto-bump version on main branch or manual trigger
      # เพิ่มเวอร์ชันอัตโนมัติบน main branch หรือ trigger แบบ manual
      - name: Bump version
        id: bump
        if: github.ref == 'refs/heads/main' || github.event.inputs.bump_version != 'none'
        working-directory: .
        run: |
          BUMP_TYPE="${{ github.event.inputs.bump_version || 'patch' }}"

          # Read current version from version.json
          CURRENT=$(node -e "console.log(require('./version.json').version)")
          BUILD=$(node -e "console.log(require('./version.json').build || 1)")

          # Calculate new version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP_TYPE" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          NEW_BUILD=$((BUILD + 1))

          echo "Bumping version: $CURRENT -> $NEW_VERSION (build $NEW_BUILD)"

          # Update version.json
          node -e "
            const fs = require('fs');
            const v = JSON.parse(fs.readFileSync('./version.json', 'utf8'));
            v.version = '$NEW_VERSION';
            v.build = $NEW_BUILD;
            v.releaseDate = new Date().toISOString().split('T')[0];
            fs.writeFileSync('./version.json', JSON.stringify(v, null, 2) + '\n');
          "

          # Update mobile/app.json version
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('./mobile/app.json', 'utf8'));
            app.expo.version = '$NEW_VERSION';
            app.expo.android.versionCode = $NEW_BUILD;
            app.expo.ios.buildNumber = '$NEW_BUILD';
            fs.writeFileSync('./mobile/app.json', JSON.stringify(app, null, 2) + '\n');
          "

          # Update mobile/package.json version
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./mobile/package.json', 'utf8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('./mobile/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "build=$NEW_BUILD" >> $GITHUB_OUTPUT
          echo "bumped=true" >> $GITHUB_OUTPUT

      - name: Get version info (no bump)
        id: version
        run: |
          if [ "${{ steps.bump.outputs.bumped }}" = "true" ]; then
            echo "version=${{ steps.bump.outputs.version }}" >> $GITHUB_OUTPUT
            echo "build=${{ steps.bump.outputs.build }}" >> $GITHUB_OUTPUT
          else
            if [ -f ../version.json ]; then
              VERSION=$(node -e "console.log(require('../version.json').version)")
              BUILD=$(node -e "console.log(require('../version.json').build || 1)")
            else
              VERSION="1.0.0"
              BUILD="1"
            fi
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "build=$BUILD" >> $GITHUB_OUTPUT
          fi
          echo "Version: $(cat $GITHUB_OUTPUT | grep version | head -1)"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # Run lint and type check before build
      - name: Lint & type check
        run: npx tsc --noEmit || echo "TypeScript check completed"

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # Decode signing keystore if available
      - name: Setup release signing
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          cat >> android/gradle.properties << EOF
          RELEASE_STORE_FILE=release.keystore
          RELEASE_STORE_PASSWORD=$KEYSTORE_PASSWORD
          RELEASE_KEY_ALIAS=$KEY_ALIAS
          RELEASE_KEY_PASSWORD=$KEY_PASSWORD
          EOF

      # Workaround: foojay-resolver plugin download fails intermittently (403 from CDN)
      # Since Java is already provided by setup-java action, we don't need auto-download
      - name: Disable Gradle toolchain auto-download
        run: |
          # Patch @react-native/gradle-plugin to skip foojay-resolver
          SETTINGS_KTS="node_modules/@react-native/gradle-plugin/settings.gradle.kts"
          if [ -f "$SETTINGS_KTS" ]; then
            echo "=== Before patch ==="
            grep -n foojay "$SETTINGS_KTS" || true
            # Comment out the entire plugins block containing foojay
            sed -i '/foojay/s/^/\/\/ /' "$SETTINGS_KTS"
            echo "=== After patch ==="
            grep -n foojay "$SETTINGS_KTS" || true
            echo "=== Full file ==="
            cat "$SETTINGS_KTS"
          else
            echo "WARNING: $SETTINGS_KTS not found!"
            find node_modules/@react-native -name "settings.gradle*" 2>/dev/null || true
          fi
          # Also disable auto-download in gradle.properties
          echo "org.gradle.java.installations.auto-download=false" >> android/gradle.properties

      - name: Build APK (Release)
        run: |
          cd android
          # Retry Gradle build up to 3 times (transient CDN/network failures)
          BUILD_SUCCESS=false
          for i in 1 2 3; do
            echo "=== Build attempt $i ==="
            if ./gradlew assembleRelease \
              -PversionName="${{ steps.version.outputs.version }}" \
              -PversionCode=${{ steps.version.outputs.build }} \
              --build-cache; then
              BUILD_SUCCESS=true
              break
            fi
            echo "Build attempt $i failed, retrying in 30s..."
            # Clean Gradle caches before retry to avoid stale state
            rm -rf ~/.gradle/caches/modules-2/files-2.1/org.gradle.toolchains 2>/dev/null || true
            sleep 30
          done
          if [ "$BUILD_SUCCESS" != "true" ]; then
            echo "All build attempts failed!"
            exit 1
          fi
          # Verify APK was created
          echo "=== APK files found ==="
          find . -name "*.apk" -type f -ls || echo "WARNING: No APK files found"

      - name: Find and rename APK
        id: find-apk
        run: |
          echo "=== Searching for APK files ==="
          find android -name "*.apk" -type f 2>/dev/null || true
          APK_PATH=$(find android -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK file found!"
            exit 1
          fi
          APK_NAME="TPIX-TRADE-v${{ steps.version.outputs.version }}.apk"
          cp "$APK_PATH" "$APK_NAME"
          echo "apk_path=$APK_NAME" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          ls -lh "$APK_NAME"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TPIX-TRADE-v${{ steps.version.outputs.version }}
          path: mobile/${{ steps.find-apk.outputs.apk_path }}
          retention-days: 90

      # Commit version bump back to repo
      # Commit การเพิ่มเวอร์ชันกลับไปที่ repo
      - name: Commit version bump
        if: steps.bump.outputs.bumped == 'true'
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json mobile/app.json mobile/package.json
          git diff --staged --quiet || git commit -m "chore: bump version to v${{ steps.version.outputs.version }} (build ${{ steps.version.outputs.build }})"
          git push || echo "Push failed - may need permissions"

      # Create GitHub Release with APK (on main or manual)
      - name: Create Release with APK
        if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || (github.event.inputs.create_release == 'true')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-v${{ steps.version.outputs.version }}
          name: 'TPIX TRADE Mobile v${{ steps.version.outputs.version }}'
          body: |
            ## TPIX TRADE Mobile v${{ steps.version.outputs.version }}

            **Build:** #${{ steps.version.outputs.build }}
            **Platform:** Android
            **Min SDK:** 24 (Android 7.0)

            ### Download & Install / ดาวน์โหลดและติดตั้ง
            1. Download the APK file below / ดาวน์โหลดไฟล์ APK ด้านล่าง
            2. Enable "Install from unknown sources" / เปิด "ติดตั้งจากแหล่งที่ไม่รู้จัก"
            3. Open the downloaded APK to install / เปิดไฟล์ APK ที่ดาวน์โหลดเพื่อติดตั้ง

            ### What's New / มีอะไรใหม่
            - Performance & code quality improvements
            - Web platform support
            - In-app update checker
            - Fixed export/import consistency
            - Responsive layout for all screen sizes

            ### Tech Stack
            - React Native (Expo) + TypeScript
            - Zustand state management
            - Glass morphism dark theme
          files: mobile/${{ steps.find-apk.outputs.apk_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        if: always()
        run: |
          echo "## Build Android APK" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** v${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Build:** #${{ steps.version.outputs.build }}" >> $GITHUB_STEP_SUMMARY
          if [ -f "${{ steps.find-apk.outputs.apk_path }}" ]; then
            SIZE=$(du -h "${{ steps.find-apk.outputs.apk_path }}" | cut -f1)
            echo "**APK Size:** $SIZE" >> $GITHUB_STEP_SUMMARY
            echo "**Status:** ✅ Success" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status:** ❌ Failed" >> $GITHUB_STEP_SUMMARY
          fi
