name: Auto Deploy to Production

on:
  workflow_run:
    workflows: ["CI - Tests & Quality Checks"]
    types:
      - completed
    branches:
      - main

  workflow_dispatch:
    inputs:
      skip_ci:
        description: 'Skip CI checks (fast deploy)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  pre-check:
    name: Pre-deploy Check
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - run: composer install --prefer-dist --no-interaction --no-dev --optimize-autoloader
      - run: php -l routes/api.php
      - run: php -l routes/web.php

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [pre-check]
    if: >
      always() &&
      (needs.pre-check.result == 'success' || github.event.inputs.skip_ci == 'true')

    steps:
      - name: Check SSH secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$SSH_HOST" ] || [ -z "$SSH_USER" ] || [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "::error::Required SSH secrets are not configured."
            echo "Please set: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY"
            echo "Optional: SSH_PORT (defaults to 22), DEPLOY_PATH, APP_URL"
            exit 1
          fi
          echo "✓ SSH secrets configured"

      - name: Deploy via SSH (git pull + optimize)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 5m
          script: |
            set -e

            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            DEPLOY_PATH="${DEPLOY_PATH:-/home/admin/domains/tpix.online}"

            echo "🚀 Starting deployment to ${DEPLOY_PATH}"
            cd "${DEPLOY_PATH}"

            # Backup .env
            cp .env .env.backup.$(date +%Y%m%d_%H%M%S) 2>/dev/null || true

            # Pull latest code — ใช้ PAT สำหรับ private repo
            echo "📥 Pulling latest code..."
            if [ -n "${{ secrets.GH_PAT }}" ]; then
              git remote set-url origin "https://x-access-token:${{ secrets.GH_PAT }}@github.com/xjanova/ThaiXTrade.git"
            fi
            git fetch origin main
            git reset --hard origin/main

            # Set GITHUB_TOKEN in .env for GitHub API access (App Releases)
            if [ -n "${{ secrets.GH_PAT }}" ]; then
              if grep -q '^GITHUB_TOKEN=' .env 2>/dev/null; then
                sed -i "s|^GITHUB_TOKEN=.*|GITHUB_TOKEN=${{ secrets.GH_PAT }}|" .env
              else
                echo "GITHUB_TOKEN=${{ secrets.GH_PAT }}" >> .env
              fi
              echo "✓ GITHUB_TOKEN set in .env"
            fi

            # Install composer dependencies
            echo "📦 Installing composer dependencies..."
            composer install --no-dev --optimize-autoloader --no-interaction --ignore-platform-req=ext-gmp 2>&1 || {
              echo "⚠️ Composer install failed, trying with --no-scripts"
              composer install --no-dev --optimize-autoloader --no-interaction --no-scripts --ignore-platform-req=ext-gmp
            }

            # Install NPM and build assets
            echo "🏗️ Building frontend assets..."
            rm -rf node_modules 2>/dev/null || true
            npm install --no-audit --no-fund 2>&1
            node ./node_modules/vite/bin/vite.js build 2>&1

            # Run migrations + seeders
            echo "🗃️ Running migrations..."
            php artisan migrate --force 2>&1 || echo "⚠️ Migration warnings (non-fatal)"
            echo "🌱 Running ecosystem seeder..."
            php artisan db:seed --class=TpixEcosystemSeeder --force 2>&1 || echo "⚠️ Seeder warnings (non-fatal)"

            # Clear and rebuild caches
            echo "⚡ Optimizing application..."
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache 2>/dev/null || true

            # Storage symlink สำหรับ file uploads (logo, banners, etc.)
            # Laravel ใช้ public_html (ไม่ใช่ public) — สร้าง symlink ถูกที่
            if [ ! -L "public_html/storage" ]; then
              rm -rf public_html/storage 2>/dev/null || true
              ln -sf "$(pwd)/storage/app/public" "$(pwd)/public_html/storage"
              echo "✅ Created storage symlink: public_html/storage → storage/app/public"
            else
              echo "✅ Storage symlink exists"
            fi

            # สร้างโฟลเดอร์ upload
            mkdir -p storage/app/public/logos storage/app/public/favicons storage/app/public/seo storage/app/public/articles 2>/dev/null || true

            # รัน seeders ตามลำดับ: chains → tokens → trading pairs (idempotent)
            php artisan db:seed --class=Database\\Seeders\\AllChainsSeeder --force 2>&1 || echo "⚠️ Chains seeder warning"
            php artisan db:seed --class=Database\\Seeders\\BaseTokensSeeder --force 2>&1 || echo "⚠️ Tokens seeder warning"
            php artisan db:seed --class=Database\\Seeders\\TpixTradingPairSeeder --force 2>&1 || echo "⚠️ TpixPair seeder warning"
            # Major pairs (BTC, ETH, BNB, SOL, ฯลฯ) — index trading บน TPIX chain
            php artisan db:seed --class=Database\\Seeders\\MajorTradingPairsSeeder --force 2>&1 || echo "⚠️ MajorPairs seeder warning"
            # Token logos — update existing tokens ที่ logo=null (TPIX, USDT จาก TpixPair)
            php artisan db:seed --class=Database\\Seeders\\TokenLogosSeeder --force 2>&1 || echo "⚠️ TokenLogos seeder warning"

            # Fix permissions
            chmod -R 775 storage bootstrap/cache 2>/dev/null || true

            # Restart queue workers if running
            php artisan queue:restart 2>/dev/null || true

            # Setup cron for Laravel Scheduler (content auto-generation)
            CRON_CMD="cd $(pwd) && php artisan schedule:run >> /dev/null 2>&1"
            (crontab -l 2>/dev/null | grep -v "artisan schedule:run"; echo "* * * * * $CRON_CMD") | sort -u | crontab - 2>/dev/null || echo "⚠️ Cron setup skipped (no crontab access)"
            echo "✅ Laravel scheduler cron configured"

            echo "✅ Deployment completed successfully!"

      - name: Health Check
        env:
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          URL="${APP_URL:-https://tpix.online}"
          echo "🔍 Checking health at: ${URL}"
          sleep 5
          HTTP_CODE=$(curl -s -o /tmp/health_response.txt -w "%{http_code}" "${URL}" || echo "000")
          if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 302 ]; then
            echo "✅ Application is healthy (HTTP $HTTP_CODE)"
          else
            echo "⚠️ Health check returned HTTP $HTTP_CODE (may still be starting up)"
          fi

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Deployment Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ **Status:** Success" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Status:** Failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "**Branch:** main" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
