name: tpix_trade
description: "TPIX TRADE — Decentralized Exchange"
publish_to: 'none'
version: 1.1.68+389

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # UI / Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17

  # State Management
  provider: ^6.1.5

  # Navigation
  go_router: ^14.8.1

  # Blockchain / Crypto
  web3dart: ^2.7.3
  bip39: ^1.0.6
  bip32: ^2.0.0
  hex: ^0.2.0
  crypto: ^3.0.6

  # Security
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0

  # Storage
  shared_preferences: ^2.5.3

  # Network
  dio: ^5.8.0+1
  web_socket_channel: ^3.0.2

  # Deep links (cross-app discovery)
  app_links: ^6.3.2

  # External Wallet — WalletConnect v2 / Reown AppKit
  # รองรับ MetaMask, Trust, Rainbow, Coinbase, OKX 100+ wallet
  # ต้องตั้ง REOWN_PROJECT_ID ผ่าน --dart-define ตอน build
  reown_appkit: ^1.6.0

  # Chart (WebView for TradingView lightweight-charts)
  webview_flutter: ^4.10.0

  # Utils
  intl: ^0.20.2
  package_info_plus: ^8.3.0
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  open_filex: ^4.6.0
  share_plus: ^10.1.4
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false  # iOS folder ยังไม่มี — Android only
  image_path: "logotpixdextrade.png"
  adaptive_icon_background: "#0A0E1A"
  adaptive_icon_foreground: "logotpixdextrade.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
    - assets/html/
